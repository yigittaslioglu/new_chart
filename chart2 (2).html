  }
  rebuildInds(){for(const i of this.inds)this._buildInd(i)}
  _buildInd(inst){
    const def=REGISTRY[inst.key],d=this.data;
    inst.plots=[];inst.guides=null;inst.hasHist=false;inst.err=null;
    if(!d.length)return;
    let plots;
    try{plots=def.build(d,inst.params)||[]}catch(e){inst.err=e.message;return}
    const tmap=new Map();d.forEach((b,i)=>tmap.set(b.time,i));
    for(const pl of plots){
      const vals=Array(d.length).fill(null);let colors=null;
      for(const pt of(pl.data||[])){
        const i=tmap.get(pt.time);if(i==null)continue;
        vals[i]=pt.value;
        if(pt.color){colors=colors||Array(d.length).fill(null);colors[i]=pt.color}
      }
      if(pl.guides)inst.guides=(inst.guides||[]).concat(pl.guides);
      const type=(pl.type==='line')?'line':'hist';
      if(type==='hist')inst.hasHist=true;
      inst.plots.push({type,color:pl.color,width:pl.width||1.6,dashed:!!pl.dashed,vals,colors,title:pl.title});
    }
  }
  serializeView(){
    return{type:this.type,log:this.log,hideDraw:this.hideDraw,style:{...this.style},
      inds:this.inds.map(i=>({key:i.key,params:{...i.params}})),
      drawings:this.drawings.map(d=>({...d,a:{...d.a},b:d.b?{...d.b}:undefined}))};
  }
  applyView(v){
    if(!v)return;
    this.type=v.type||'candles';this.log=!!v.log;this.hideDraw=!!v.hideDraw;
    this.style=v.style||{};
    this.inds=[];this._iid=0;
    (v.inds||[]).forEach(x=>{const def=REGISTRY[x.key];if(!def)return;
      const inst={id:++this._iid,key:x.key,params:{...x.params},name:def.name,short:def.short,overlay:!!def.overlay};
      this.inds.push(inst)});
    this.drawings=(v.drawings||[]).map(d=>({...d}));
    this._did=this.drawings.reduce((m,d)=>Math.max(m,d.id||0),0);
    this._rebuildDisp();this.rebuildInds();this.requestDraw();
  }

  /* ===== görünüm hareketleri ===== */
  fit(nBars=170){
    const n=this.data.length;if(!n||this.plotW()<=0)return;
    this.manual={};
    const vis=Math.min(nBars,n);
    this.bs=clamp(this.plotW()*.94/vis,.5,90);
    this.offset=n-1+(this.plotW()/this.bs)*.05;
    this._clamp();this.requestDraw();
  }
  pan(dx){this.offset-=dx/this.bs;this._clamp();this.requestDraw()}
  zoomAt(x,f){
    const anchor=this.iOf(x);
    this.bs=clamp(this.bs*f,.5,90);
    this.offset=anchor+(this.plotW()-x)/this.bs;
    this._clamp();this.requestDraw();
  }
  _clamp(){
    const n=this.data.length;if(!n)return;
    const blank=this.plotW()/this.bs*.85;
    this.offset=clamp(this.offset,Math.min(3,n-1),n-1+blank);
  }
  scaleY(key,dy){
    const pane=this.panes.find(p=>this._paneKey(p)===key)||this.panes[0];
    const cur=this.manual[key]||{vMin:pane.vMin,vMax:pane.vMax};
    if(!(cur.vMax>cur.vMin))return;
    const f=Math.exp(dy*.004);
    if(pane===this.panes[0]&&this.log&&cur.vMin>0){
      const a=Math.log(cur.vMin),b=Math.log(cur.vMax),c=(a+b)/2,h=(b-a)/2*f;
      this.manual[key]={vMin:Math.exp(c-h),vMax:Math.exp(c+h)};
    }else{
      const c=(cur.vMin+cur.vMax)/2,h=(cur.vMax-cur.vMin)/2*f;
      this.manual[key]={vMin:c-h,vMax:c+h};
    }
    this.requestDraw();
  }
  scaleX(dx){this.zoomAt(this.plotW(),Math.exp(-dx*.005))}
  shiftY(key,dy){
    const pane=this.panes.find(p=>this._paneKey(p)===key)||this.panes[0];
    const cur=this.manual[key];if(!cur||!(cur.vMax>cur.vMin))return;
    if(pane===this.panes[0]&&this.log&&cur.vMin>0){
      const a=Math.log(cur.vMin),b=Math.log(cur.vMax),ds=dy*(b-a)/(pane.y1-pane.y0);
      this.manual[key]={vMin:Math.exp(a+ds),vMax:Math.exp(b+ds)};
    }else{
      const dv=dy*(cur.vMax-cur.vMin)/(pane.y1-pane.y0);
      this.manual[key]={vMin:cur.vMin+dv,vMax:cur.vMax+dv};
    }
    this.requestDraw();
  }
  resetScale(pane){delete this.manual[this._paneKey(pane)];this.requestDraw()}

  /* ===== yerleşim + ölçek ===== */
  _layout(){
    const ph=this.plotH();
    const paneInds=this.inds.filter(i=>!i.overlay&&!i.err);
    const frac=paneInds.length?Math.min(.22,.55/paneInds.length):0;
    const mainH=ph*(1-frac*paneInds.length);
    this.panes=[{ind:null,y0:0,y1:mainH}];
    let y=mainH;
    for(const ind of paneInds){const h=ph*frac;this.panes.push({ind,y0:y,y1:y+h});y+=h}
  }
  _autoscale(){
    this._layout();
    const r=this.visRange(),main=this.panes[0];
    const priceBased=['candles','hollow','heikin','bars'].includes(this.type);
    let lo=Infinity,hi=-Infinity;
    if(r){
      for(let i=r.from;i<=r.to;i++){
        const b=this._disp[i]||this.data[i];
        if(priceBased){if(b.low<lo)lo=b.low;if(b.high>hi)hi=b.high}
        else{if(b.close<lo)lo=b.close;if(b.close>hi)hi=b.close}
      }
      for(const ind of this.inds)if(ind.overlay&&!ind.err)
        for(const pl of ind.plots)for(let i=r.from;i<=r.to;i++){
          const v=pl.vals[i];if(v==null)continue;if(v<lo)lo=v;if(v>hi)hi=v;
        }
    }
    if(!(hi>lo)){lo=lo===Infinity?0:lo;hi=lo+1}
    const pad=(hi-lo)*this.padFrac;
    main.vMin=lo-pad;main.vMax=hi+pad;
    const mm=this.manual.main;
    if(mm&&mm.vMax>mm.vMin){main.vMin=mm.vMin;main.vMax=mm.vMax}
    main.logSpace=this.log&&main.vMin>0;
    if(main.logSpace){main.sMin=Math.log(main.vMin);main.sMax=Math.log(main.vMax)}
    this._pMin=main.vMin;this._pMax=main.vMax;

    for(let pi=1;pi<this.panes.length;pi++){
      const pane=this.panes[pi],ind=pane.ind;
      let a=Infinity,b=-Infinity;
      if(r)for(const pl of ind.plots)for(let i=r.from;i<=r.to;i++){
        const v=pl.vals[i];if(v==null)continue;if(v<a)a=v;if(v>b)b=v;
      }
      if(ind.guides)for(const g of ind.guides){if(g.v<a)a=g.v;if(g.v>b)b=g.v}
      if(ind.hasHist){if(0<a)a=0;if(0>b)b=0}
      if(!(b>a)){a=a===Infinity?0:a;b=a+1}
      const pd=(b-a)*.1;
      pane.vMin=a-pd;pane.vMax=b+pd;pane.logSpace=false;
      const mi=this.manual['i'+ind.id];
      if(mi&&mi.vMax>mi.vMin){pane.vMin=mi.vMin;pane.vMax=mi.vMax}
    }
  }

  /* ===== tickler / biçim ===== */
  static niceStep(range,maxTicks){
    if(!(range>0)||!(maxTicks>0))return 1;
    const rough=range/maxTicks,mag=Math.pow(10,Math.floor(Math.log10(rough))),r=rough/mag;
    return(r<=1?1:r<=2?2:r<=2.5?2.5:r<=5?5:10)*mag;
  }
  paneTicks(pane){
    const h=pane.y1-pane.y0;
    const maxT=Math.max(2,Math.floor(h/(pane.ind?38:56)));
    const step=Motor.niceStep(pane.vMax-pane.vMin,maxT);
    if(!pane.ind)this._lastStep=step;
    const out=[];const start=Math.ceil(pane.vMin/step)*step;
    for(let v=start;v<=pane.vMax+1e-9;v+=step)out.push(v);
    return{step,ticks:out};
  }
  fmtPrice(p,step){
    step=step||this._lastStep;
    let dec=0;
    if(step<1)dec=Math.min(8,Math.max(0,-Math.floor(Math.log10(step))+(/^(1|2|5)/.test(step.toExponential())?0:1)));
    if(Math.abs(p)>=1e6)return(p/1e6).toFixed(2)+'M';
    return p.toLocaleString('tr-TR',{minimumFractionDigits:dec,maximumFractionDigits:Math.max(dec,step<1?dec:0)});
  }
  fmtPx(p){ /* sembol hassasiyetiyle */
    if(Math.abs(p)>=1e6)return(p/1e6).toFixed(2)+'M';
    return p.toLocaleString('tr-TR',{minimumFractionDigits:this.prec,maximumFractionDigits:this.prec});
  }
  timeTicks(){
    const r=this.visRange();if(!r)return[];
    const NICE=[1,2,3,5,10,15,20,30,45,60,90,120,180,240,360,480,720,1000];
    const need=Math.max(1,Math.ceil(92/this.bs));
    let step=NICE.find(v=>v>=need)||Math.ceil(need/500)*500;
    const out=[];let prev=null;
    const start=Math.ceil(r.from/step)*step;
    for(let i=start;i<=r.to;i+=step){
      const d=new Date(this.data[i].time*1000);
      out.push({i,x:this.xOf(i),label:this._tickLabel(d,prev),major:!prev||d.getFullYear()!==prev.getFullYear()||d.getMonth()!==prev.getMonth()});
      prev=d;
    }
    return out;
  }
  _tickLabel(d,prev){
    const day=this.tfSec>=86400;
    if(!prev||d.getFullYear()!==prev.getFullYear())return String(d.getFullYear());
    if(d.getMonth()!==prev.getMonth())return AYLAR[d.getMonth()];
    if(day)return String(d.getDate());
    if(d.getDate()!==prev.getDate())return d.getDate()+' '+AYLAR[d.getMonth()];
    return pad2(d.getHours())+':'+pad2(d.getMinutes());
  }
  timeOfIndex(i){
    const n=this.data.length;if(!n)return 0;
    if(i<0)return this.data[0].time+i*this.tfSec;
    if(i>n-1)return this.data[n-1].time+(i-(n-1))*this.tfSec;
    return this.data[i].time;
  }
  fmtTime(t){
    const d=new Date(t*1000);
    const base=d.getDate()+' '+AYLAR[d.getMonth()]+' '+String(d.getFullYear()).slice(2);
    return this.tfSec>=86400?base:base+'  '+pad2(d.getHours())+':'+pad2(d.getMinutes());
  }

  /* ===== boyut ===== */
  resize(){
    const r=this.wrap.getBoundingClientRect();
    this._rect=r;
    this.w=Math.max(40,Math.floor(r.width));this.h=Math.max(40,Math.floor(r.height));
    this.dpr=(typeof window!=='undefined'&&window.devicePixelRatio)||1;
    for(const cv of[this.cv,this.ov]){
      cv.width=Math.round(this.w*this.dpr);cv.height=Math.round(this.h*this.dpr);
      cv.style.width=this.w+'px';cv.style.height=this.h+'px';
    }
    this.requestDraw();
  }
  crisp(v){const d=this.dpr;return Math.round(v*d)/d}
  hair(v){const d=this.dpr;return(Math.round(v*d)+(Math.round(d)%2?.5:0))/d}
  requestDraw(){
    if(this._raf)return;
    const raf=(typeof window!=='undefined'&&window.requestAnimationFrame)?window.requestAnimationFrame.bind(window):f=>setTimeout(()=>f(),16);
    this._raf=raf(()=>{this._raf=0;this.draw();this.drawOverlay()});
  }
  _reqOverlay(){
    if(this._raf||this._oraf)return;
    const raf=(typeof window!=='undefined'&&window.requestAnimationFrame)?window.requestAnimationFrame.bind(window):f=>setTimeout(()=>f(),16);
    this._oraf=raf(()=>{this._oraf=0;this.drawOverlay()});
  }

  /* ===== ana çizim ===== */
  draw(){
    const t0=(typeof performance!=='undefined')?performance.now():Date.now();
    const ctx=this.ctx,T=this.T(),pw=this.plotW(),ph=this.plotH();
    ctx.setTransform(this.dpr,0,0,this.dpr,0,0);
    ctx.fillStyle=T.bg;ctx.fillRect(0,0,this.w,this.h);
    if(!this.data.length||pw<=0||ph<=0){this.lastDrawn=0;return}
    this._autoscale();
    const r=this.visRange();
    this.lastDrawn=r?(r.to-r.from+1):0;

    const tt=this.timeTicks();
    const paneTickData=this.panes.map(p=>this.paneTicks(p));
    ctx.strokeStyle=T.grid;ctx.lineWidth=1;ctx.beginPath();
    this.panes.forEach((pane,pi)=>{
      for(const v of paneTickData[pi].ticks){
        const y=this.hair(this.toY(pane,v));
        if(y<pane.y0-1||y>pane.y1+1)continue;
        ctx.moveTo(0,y);ctx.lineTo(pw,y);
      }
    });
    for(const t of tt){
      const x=this.hair(t.x);if(x<0||x>pw)continue;
      ctx.moveTo(x,0);ctx.lineTo(x,ph);
    }
    ctx.stroke();

    ctx.font='11px '+T.mono;ctx.textBaseline='middle';ctx.textAlign='left';ctx.fillStyle=T.muted;
    let maxLabelW=0;
    this.panes.forEach((pane,pi)=>{
      const{step,ticks}=paneTickData[pi];
      for(const v of ticks){
        const y=this.toY(pane,v);
        if(y<pane.y0+6||y>pane.y1-6)continue;
        const s=this.fmtPrice(v,step);
        const w2=ctx.measureText(s).width;if(w2>maxLabelW)maxLabelW=w2;
        ctx.fillText(s,pw+8,y);
      }
    });
    this.axisW=clamp(Math.ceil(maxLabelW)+18,52,96);
    ctx.textAlign='center';ctx.textBaseline='top';
    for(const t of tt){
      if(t.x<0||t.x>pw)continue;
      ctx.fillStyle=t.major?T.ink:T.muted;
      ctx.font=(t.major?'600 ':'')+'11px '+T.mono;
      ctx.fillText(t.label,t.x,ph+6);
    }

    ctx.strokeStyle=T.border;ctx.lineWidth=1;ctx.beginPath();
    for(let pi=1;pi<this.panes.length;pi++){
      const y=this.hair(this.panes[pi].y0);
      ctx.moveTo(0,y);ctx.lineTo(this.w,y);
    }
    ctx.moveTo(this.hair(pw),0);ctx.lineTo(this.hair(pw),ph);
    ctx.moveTo(0,this.hair(ph));ctx.lineTo(this.w,this.hair(ph));
    ctx.stroke();

    const main=this.panes[0];
    ctx.fillStyle=T.ink+'0c';
    ctx.font='700 42px '+T.sans;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(this.sym,pw/2,(main.y0+main.y1)/2);

    if(!r){this.lastDrawMs=0;return}

    ctx.save();ctx.beginPath();ctx.rect(0,main.y0,pw,main.y1-main.y0);ctx.clip();
    this._drawSeries(ctx,main,r);
    for(const ind of this.inds)if(ind.overlay&&!ind.err)this._drawPlots(ctx,main,ind,r);
    ctx.restore();

    for(let pi=1;pi<this.panes.length;pi++){
      const pane=this.panes[pi];
      ctx.save();ctx.beginPath();ctx.rect(0,pane.y0,pw,pane.y1-pane.y0);ctx.clip();
      this._drawPlots(ctx,pane,pane.ind,r);
      ctx.restore();
    }

    this._renderDrawings(ctx);

    const last=this.data[this.data.length-1];
    const yLast=this.toY(main,last.close);
    if(yLast>=main.y0&&yLast<=main.y1){
      const up=last.close>=last.open,col=up?T.up:T.down;
      ctx.save();
      ctx.setLineDash([4,4]);ctx.strokeStyle=col+'aa';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(0,this.hair(yLast));ctx.lineTo(pw,this.hair(yLast));ctx.stroke();
      ctx.setLineDash([]);
      const txt=this.fmtPx(last.close);
      ctx.font='600 11px '+T.mono;
      const tw=ctx.measureText(txt).width;
      ctx.fillStyle=col;
      ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(pw+2,this.crisp(yLast-9),tw+12,18,4);else ctx.rect(pw+2,this.crisp(yLast-9),tw+12,18);
      ctx.fill();
      ctx.fillStyle='#fff';ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(txt,pw+8,yLast);
      ctx.restore();
    }

    this.lastDrawMs=((typeof performance!=='undefined')?performance.now():Date.now())-t0;
    if(this.hooks.onDraw)this.hooks.onDraw(this);
  }

  _drawSeries(ctx,pane,r){
    const t=this.type;
    if(t==='candles'||t==='heikin')return this._candles(ctx,pane,r,false);
    if(t==='hollow')return this._candles(ctx,pane,r,true);
    if(t==='bars')return this._ohlcBars(ctx,pane,r);
    if(t==='line'||t==='step')return this._lineSeries(ctx,pane,r,t==='step');
    if(t==='area')return this._areaSeries(ctx,pane,r);
    if(t==='baseline')return this._baselineSeries(ctx,pane,r);
    return this._candles(ctx,pane,r,false);
  }
  _candles(ctx,pane,r,hollow){
    const T=this.T(),D=this._disp,d=this.dpr,R=v=>Math.round(v*d)/d;
    const bodyW=Math.max(1,Math.floor(this.bs*.68)),half=bodyW/2,thin=this.bs<1.6;
    for(let pass=0;pass<2;pass++){
      const wantUp=pass===0,col=wantUp?T.up:T.down;
      ctx.fillStyle=col;ctx.beginPath();
      const strokes=[];
      for(let i=r.from;i<=r.to;i++){
        const b=D[i];if((b.close>=b.open)!==wantUp)continue;
        const x=this.xOf(i);
        const yH=this.toY(pane,b.high),yL=this.toY(pane,b.low);
        ctx.rect(R(x)-.5,yH,1,Math.max(1,yL-yH));
        if(thin)continue;
        const yO=this.toY(pane,b.open),yC=this.toY(pane,b.close);
        const top=Math.min(yO,yC),hh=Math.max(1,Math.abs(yC-yO));
        const xl=R(x-half),wR=Math.max(1,R(x+half)-xl);
        if(hollow&&wantUp)strokes.push([xl+.5,R(top)+.5,Math.max(1,wR-1),Math.max(1,hh-1)]);
        else ctx.rect(xl,R(top),wR,hh);
      }
      ctx.fill();
      if(strokes.length){
        ctx.fillStyle=T.bg;ctx.beginPath();
        for(const s of strokes)ctx.rect(s[0],s[1],s[2],s[3]);
        ctx.fill();
        ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();
        for(const s of strokes)ctx.rect(s[0],s[1],s[2],s[3]);
        ctx.stroke();
      }
    }
  }
  _ohlcBars(ctx,pane,r){
    const T=this.T(),D=this._disp,tick=Math.max(2,this.bs*.3);
    for(let pass=0;pass<2;pass++){
      const wantUp=pass===0;
      ctx.strokeStyle=wantUp?T.up:T.down;
      ctx.lineWidth=Math.max(1,Math.min(2.5,this.bs*.14));
      ctx.beginPath();
      for(let i=r.from;i<=r.to;i++){
        const b=D[i];if((b.close>=b.open)!==wantUp)continue;
        const x=this.hair(this.xOf(i));
        ctx.moveTo(x,this.toY(pane,b.high));ctx.lineTo(x,this.toY(pane,b.low));
        ctx.moveTo(x-tick,this.hair(this.toY(pane,b.open)));ctx.lineTo(x,this.hair(this.toY(pane,b.open)));
        ctx.moveTo(x,this.hair(this.toY(pane,b.close)));ctx.lineTo(x+tick,this.hair(this.toY(pane,b.close)));
      }
      ctx.stroke();
    }
  }
  _linePath(ctx,pane,r,step){
    let pen=false;
    for(let i=r.from;i<=r.to;i++){
      const b=this._disp[i],x=this.xOf(i),y=this.toY(pane,b.close);
      if(!pen){ctx.moveTo(x,y);pen=true}
      else if(step){ctx.lineTo(x,this._lastY);ctx.lineTo(x,y)}
      else ctx.lineTo(x,y);
      this._lastY=y;
    }
  }
  _lineSeries(ctx,pane,r,step){
    const T=this.T();
    ctx.strokeStyle=T.lineColor;ctx.lineWidth=T.lineWidth;ctx.lineJoin='round';
    ctx.beginPath();this._linePath(ctx,pane,r,step);ctx.stroke();
  }
  _areaSeries(ctx,pane,r){
    const T=this.T();
    let fill=T.lineColor+'26';
    try{
      const g=ctx.createLinearGradient(0,pane.y0,0,pane.y1);
      if(g&&g.addColorStop){g.addColorStop(0,T.lineColor+'55');g.addColorStop(1,T.lineColor+'05');fill=g}
    }catch(e){}
    ctx.beginPath();this._linePath(ctx,pane,r,false);
    ctx.lineTo(this.xOf(r.to),pane.y1);ctx.lineTo(this.xOf(r.from),pane.y1);ctx.closePath();
    ctx.fillStyle=fill;ctx.fill();
    ctx.strokeStyle=T.lineColor;ctx.lineWidth=T.lineWidth;ctx.lineJoin='round';
    ctx.beginPath();this._linePath(ctx,pane,r,false);ctx.stroke();
  }
  _baselineSeries(ctx,pane,r){
    const T=this.T(),yBase=(pane.y0+pane.y1)/2;
    for(let pass=0;pass<2;pass++){
      const above=pass===0,col=above?T.up:T.down;
      ctx.save();ctx.beginPath();
      if(above)ctx.rect(0,pane.y0,this.plotW(),yBase-pane.y0);
      else ctx.rect(0,yBase,this.plotW(),pane.y1-yBase);
      ctx.clip();
      ctx.beginPath();this._linePath(ctx,pane,r,false);
      ctx.lineTo(this.xOf(r.to),yBase);ctx.lineTo(this.xOf(r.from),yBase);ctx.closePath();
      ctx.fillStyle=col+'22';ctx.fill();
      ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineJoin='round';
      ctx.beginPath();this._linePath(ctx,pane,r,false);ctx.stroke();
      ctx.restore();
    }
    ctx.setLineDash([3,3]);ctx.strokeStyle=this.T().faint;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,this.hair(yBase));ctx.lineTo(this.plotW(),this.hair(yBase));ctx.stroke();
    ctx.setLineDash([]);
  }
  _drawPlots(ctx,pane,ind,r){
    const T=this.T();
    if(ind.guides){
      ctx.setLineDash([3,4]);ctx.lineWidth=1;
      for(const g of ind.guides){
        const y=this.hair(this.toY(pane,g.v));
        if(y<pane.y0||y>pane.y1)continue;
        ctx.strokeStyle=g.c||T.faint;
        ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(this.plotW(),y);ctx.stroke();
      }
      ctx.setLineDash([]);
    }
    for(const pl of ind.plots){
      if(pl.type==='hist'){
        const zeroV=clamp(0,pane.vMin,pane.vMax);
        const y0=this.toY(pane,zeroV);
        const bw=Math.max(1,this.bs*.62);
        const groups=new Map();
        for(let i=r.from;i<=r.to;i++){
          const v=pl.vals[i];if(v==null)continue;
          const col=(pl.colors&&pl.colors[i])||pl.color||T.muted;
          let g=groups.get(col);if(!g){g=[];groups.set(col,g)}
          g.push(i);
        }
        for(const[col,idxs]of groups){
          ctx.fillStyle=col;ctx.beginPath();
          for(const i of idxs){
            const y=this.toY(pane,pl.vals[i]);
            ctx.rect(this.xOf(i)-bw/2,Math.min(y,y0),bw,Math.max(1,Math.abs(y0-y)));
          }
          ctx.fill();
        }
      }else{
        ctx.strokeStyle=pl.color||T.accent;ctx.lineWidth=pl.width||1.6;ctx.lineJoin='round';
        ctx.setLineDash(pl.dashed?[4,4]:[]);
        ctx.beginPath();let pen=false;
        for(let i=r.from;i<=r.to;i++){
          const v=pl.vals[i];
          if(v==null){pen=false;continue}
          const x=this.xOf(i),y=this.toY(pane,v);
          pen?ctx.lineTo(x,y):(ctx.moveTo(x,y),pen=true);
        }
        ctx.stroke();ctx.setLineDash([]);
      }
    }
  }

  /* ===== çizim araçları ===== */
  setTool(t){
    this.tool=t;this.draft=null;this._measure=null;
    if(t!=='cursor')this.sel=null;
    if(this.hooks.onTool)this.hooks.onTool(t);
    this._reqOverlay();
  }
  clearDrawings(){this.drawings=[];this.sel=null;this.requestDraw();this.emitChange()}
  _removeDrawing(id){
    const at=this.drawings.findIndex(d=>d.id===id);
    if(at>=0)this.drawings.splice(at,1);
    if(this.sel===id)this.sel=null;
    this.requestDraw();this.emitChange();
  }
  _ptOf(p){
    const main=this.panes[0];
    return{i:this.iOf(p.x),v:this.toV(main,clamp(p.y,main.y0,main.y1))};
  }
  _startDraft(p){
    const pt=this._ptOf(p);
    const AC=cssVar('--accent','#2962ff');
    const COLORS={trend:AC,ray:AC,extended:AC,arrow:AC,hline:'#26a69a',hray:'#26a69a',vline:'#26a69a',rect:'#ab47bc',ellipse:'#ab47bc',fib:'#f2b63d',text:'#d1d4dc',alarm:'#ff9800'};
    this.draft={type:this.tool,a:pt,b:{...pt},color:COLORS[this.tool]||AC};
  }
  _commitDraft(){
    const d=this.draft;this.draft=null;
    if(!d)return;
    const one=['hline','hray','vline','text','alarm'].includes(d.type);
    if(!one&&Math.abs(this.xOf(d.b.i)-this.xOf(d.a.i))<3&&Math.abs(this.toY(this.panes[0],d.b.v)-this.toY(this.panes[0],d.a.v))<3)return;
    if(d.type==='text'){
      const txt=this.hooks.onPrompt?this.hooks.onPrompt('Metin:'):null;
      if(!txt)return;
      d.text=txt;
    }
    d.id=++this._did;
    this.drawings.push(d);
    this.sel=d.id;
    this.setTool('cursor');
    this.requestDraw();this.emitChange();
    if(this.hooks.onSelect)this.hooks.onSelect(this.drawings.find(x=>x.id===d.id));
  }
  _renderDrawings(ctx){
    if(!this.panes.length)return;
    const pw=this.plotW(),ph=this.plotH(),main=this.panes[0];
    const list=this.hideDraw?this.drawings.filter(d=>d.type==='alarm'):this.drawings;
    if(!list.length)return;
    ctx.save();ctx.beginPath();ctx.rect(0,0,pw,ph);ctx.clip();
    for(const d of list)if(d.type==='vline')this._renderDrawing(ctx,d,false);
    ctx.restore();
    ctx.save();ctx.beginPath();ctx.rect(0,main.y0,pw,main.y1-main.y0);ctx.clip();
    for(const d of list)if(d.type!=='vline')this._renderDrawing(ctx,d,false);
    ctx.restore();
    /* alarm etiketleri (eksen üstüne, klip dışı) */
    for(const d of list)if(d.type==='alarm'){
      const y=this.toY(main,d.a.v);
      if(y<main.y0||y>main.y1)continue;
      const txt='⏰ '+this.fmtPx(d.a.v);
      ctx.font='600 10px '+this.T().mono;
      const tw=ctx.measureText(txt).width;
      ctx.fillStyle=d.color;
      ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(pw+2,this.crisp(y-8),tw+10,16,4);else ctx.rect(pw+2,this.crisp(y-8),tw+10,16);
      ctx.fill();
      ctx.fillStyle='#1a1204';ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(txt,pw+7,y);
    }
  }
  _renderDrawing(ctx,d,ghost){
    const main=this.panes[0],pw=this.plotW(),ph=this.plotH();
    const X=i=>this.xOf(i),Y=v=>this.toY(main,v);
    ctx.strokeStyle=d.color;ctx.lineWidth=1.6;ctx.lineJoin='round';
    ctx.setLineDash(ghost?[5,4]:(d.type==='alarm'?[5,4]:[]));
    const t=d.type;
    if(t==='trend'||t==='ray'||t==='extended'||t==='arrow'){
      let x1=X(d.a.i),y1=Y(d.a.v),x2=X(d.b.i),y2=Y(d.b.v);
      const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy)||1,ux=dx/len,uy=dy/len;
      if(t==='ray'){x2=x1+ux*4000;y2=y1+uy*4000}
      if(t==='extended'){const ox1=x1,oy1=y1;x1=ox1-ux*4000;y1=oy1-uy*4000;x2=ox1+ux*4000;y2=oy1+uy*4000}
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      if(t==='arrow'){
        const ah=9;
        ctx.beginPath();
        ctx.moveTo(x2,y2);
        ctx.lineTo(x2-ux*ah-uy*ah*.6,y2-uy*ah+ux*ah*.6);
        ctx.moveTo(x2,y2);
        ctx.lineTo(x2-ux*ah+uy*ah*.6,y2-uy*ah-ux*ah*.6);
        ctx.stroke();
      }
    }else if(t==='hline'||t==='alarm'){
      const y=this.hair(Y(d.a.v));
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(pw,y);ctx.stroke();
    }else if(t==='hray'){
      const y=this.hair(Y(d.a.v)),x=X(d.a.i);
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(pw,y);ctx.stroke();
    }else if(t==='vline'){
      const x=this.hair(X(d.a.i));
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,ph);ctx.stroke();
    }else if(t==='rect'){
      const x1=X(d.a.i),y1=Y(d.a.v),x2=X(d.b.i),y2=Y(d.b.v);
      const rx=Math.min(x1,x2),ry=Math.min(y1,y2),rw=Math.abs(x2-x1),rh=Math.abs(y2-y1);
      ctx.fillStyle=d.color+'16';ctx.fillRect(rx,ry,rw,rh);
      ctx.strokeRect(rx,ry,rw,rh);
    }else if(t==='ellipse'){
      const x1=X(d.a.i),y1=Y(d.a.v),x2=X(d.b.i),y2=Y(d.b.v);
      const cx=(x1+x2)/2,cy=(y1+y2)/2,rx=Math.abs(x2-x1)/2||1,ry=Math.abs(y2-y1)/2||1;
      ctx.beginPath();
      if(ctx.ellipse)ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
      else{ctx.moveTo(cx+rx,cy);for(let a=0;a<=64;a++){const ang=a/64*Math.PI*2;ctx.lineTo(cx+Math.cos(ang)*rx,cy+Math.sin(ang)*ry)}}
      ctx.fillStyle=d.color+'14';ctx.fill();ctx.stroke();
    }else if(t==='fib'){
      const LV=[0,.236,.382,.5,.618,.786,1];
      const x1=Math.min(X(d.a.i),X(d.b.i)),x2=Math.max(X(d.a.i),X(d.b.i));
      ctx.font='10px '+this.T().mono;ctx.textAlign='left';ctx.textBaseline='bottom';
      for(const lv of LV){
        const v=d.a.v+(d.b.v-d.a.v)*lv,y=this.hair(Y(v));
        ctx.globalAlpha=lv===0||lv===1?1:.75;
        ctx.beginPath();ctx.moveTo(x1,y);ctx.lineTo(x2,y);ctx.stroke();
        ctx.fillStyle=d.color;
        ctx.fillText(lv.toFixed(3)+'  '+this.fmtPrice(v),x1+4,y-2);
      }
      ctx.globalAlpha=1;
    }else if(t==='text'){
      ctx.font='600 12px '+this.T().sans;ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillStyle=d.color;
      ctx.fillText(d.text||'',X(d.a.i),Y(d.a.v));
    }
    ctx.setLineDash([]);
  }
  _distSeg(px,py,x1,y1,x2,y2){
    const dx=x2-x1,dy=y2-y1,L=dx*dx+dy*dy;
    const tt=L?clamp(((px-x1)*dx+(py-y1)*dy)/L,0,1):0;
    return Math.hypot(px-(x1+dx*tt),py-(y1+dy*tt));
  }
  _hitTest(px,py){
    const main=this.panes[0],pw=this.plotW(),ph=this.plotH();
    const X=i=>this.xOf(i),Y=v=>this.toY(main,v),TOL=6,PT=8;
    const list=this.hideDraw?this.drawings.filter(d=>d.type==='alarm'):this.drawings;
    for(let k=list.length-1;k>=0;k--){
      const d=list[k],t=d.type;
      const xa=X(d.a.i),ya=Y(d.a.v);
      if(d.b&&['trend','ray','extended','arrow','rect','ellipse','fib'].includes(t)){
        const xb=X(d.b.i),yb=Y(d.b.v);
        if(Math.hypot(px-xa,py-ya)<PT)return{id:d.id,point:'a'};
        if(Math.hypot(px-xb,py-yb)<PT)return{id:d.id,point:'b'};
      }
      if(t==='trend'||t==='arrow'){
        if(this._distSeg(px,py,xa,ya,X(d.b.i),Y(d.b.v))<TOL)return{id:d.id};
      }else if(t==='ray'||t==='extended'){
        let xb=X(d.b.i),yb=Y(d.b.v);
        const dx=xb-xa,dy=yb-ya,len=Math.hypot(dx,dy)||1,ux=dx/len,uy=dy/len;
        const x1=t==='extended'?xa-ux*4000:xa,y1=t==='extended'?ya-uy*4000:ya;
        if(this._distSeg(px,py,x1,y1,xa+ux*4000,ya+uy*4000)<TOL)return{id:d.id};
      }else if(t==='hline'||t==='alarm'){
        if(Math.abs(py-ya)<TOL&&px>=0&&px<=pw)return{id:d.id};
      }else if(t==='hray'){
        if(Math.abs(py-ya)<TOL&&px>=xa-TOL&&px<=pw)return{id:d.id};
      }else if(t==='vline'){
        if(Math.abs(px-xa)<TOL&&py>=0&&py<=ph)return{id:d.id};
      }else if(t==='rect'){
        const xb=X(d.b.i),yb=Y(d.b.v);
        const x1=Math.min(xa,xb),x2=Math.max(xa,xb),y1=Math.min(ya,yb),y2=Math.max(ya,yb);
        if(this._distSeg(px,py,x1,y1,x2,y1)<TOL||this._distSeg(px,py,x1,y2,x2,y2)<TOL||
           this._distSeg(px,py,x1,y1,x1,y2)<TOL||this._distSeg(px,py,x2,y1,x2,y2)<TOL)return{id:d.id};
      }else if(t==='ellipse'){
        const xb=X(d.b.i),yb=Y(d.b.v);
        const cx=(xa+xb)/2,cy=(ya+yb)/2,rx=Math.abs(xb-xa)/2||1,ry=Math.abs(yb-ya)/2||1;
        const q=Math.hypot((px-cx)/rx,(py-cy)/ry);
        if(Math.abs(q-1)*Math.min(rx,ry)<TOL)return{id:d.id};
      }else if(t==='fib'){
        const xb=X(d.b.i);
        const x1=Math.min(xa,xb),x2=Math.max(xa,xb);
        for(const lv of[0,.236,.382,.5,.618,.786,1]){
          const y=Y(d.a.v+(d.b.v-d.a.v)*lv);
          if(Math.abs(py-y)<TOL&&px>=x1-TOL&&px<=x2+TOL)return{id:d.id};
        }
      }else if(t==='text'){
        const w2=(d.text||'').length*7;
        if(px>=xa-4&&px<=xa+w2+4&&Math.abs(py-ya)<10)return{id:d.id};
      }
    }
    return null;
  }

  /* ===== crosshair + pane künyeleri ===== */
  drawOverlay(){
    const ctx=this.octx,T=this.T(),pw=this.plotW(),ph=this.plotH();
    ctx.setTransform(this.dpr,0,0,this.dpr,0,0);
    ctx.clearRect(0,0,this.w,this.h);
    const c=this.cross,n=this.data.length;
    const li=c?clamp(Math.round(c.i),0,n-1):n-1;
    if(this.hooks.onLegend&&li!==this._legendI){this._legendI=li;this.hooks.onLegend(this,li)}
    if(!n||pw<=0)return;

    /* künyeler + tıklanabilir bölgeler */
    this._labelRects=[];
    ctx.font='11px '+T.mono;ctx.textBaseline='middle';ctx.textAlign='left';
    let oy=(this.panes[0].y0||0)+34;
    for(const ind of this.inds){
      if(ind.overlay){
        const col=(ind.plots[0]&&ind.plots[0].color)||T.muted;
        ctx.fillStyle=ind.err?T.down:col;
        const v=!ind.err&&ind.plots[0]?ind.plots[0].vals[li]:null;
        const s=ind.short+(v!=null?'  '+this.fmtPrice(v):(ind.err?' !':''));
        ctx.fillText(s,12,oy);
        this._labelRects.push({x:10,y:oy-9,w:ctx.measureText(s).width+8,h:18,id:ind.id});
        oy+=16;
      }
    }
    for(let pi=1;pi<this.panes.length;pi++){
      const pane=this.panes[pi],ind=pane.ind;
      let x=12;const y=pane.y0+12;
      ctx.fillStyle=T.muted;
      const nm=ind.short;
      ctx.fillText(nm,x,y);
      const startX=x;x+=ctx.measureText(nm).width+10;
      for(const pl of ind.plots){
        const v=pl.vals[li];if(v==null)continue;
        ctx.fillStyle=pl.color||T.ink;
        const s=this.fmtPrice(v);
        ctx.fillText(s,x,y);x+=ctx.measureText(s).width+10;
      }
      this._labelRects.push({x:startX-2,y:y-9,w:x-startX+4,h:18,id:ind.id});
    }

    /* taslak / seçim / ölçüm */
    const mainP=this.panes[0];
    if(this.draft){
      ctx.save();ctx.beginPath();
      if(this.draft.type==='vline')ctx.rect(0,0,pw,ph);else ctx.rect(0,mainP.y0,pw,mainP.y1-mainP.y0);
      ctx.clip();this._renderDrawing(ctx,this.draft,true);ctx.restore();
    }
    if(this.sel!=null){
      const d=this.drawings.find(x=>x.id===this.sel);
      if(d){
        ctx.fillStyle=T.accent;ctx.strokeStyle=T.bg;ctx.lineWidth=1;
        const pts=[[this.xOf(d.a.i),this.toY(mainP,d.a.v)]];
        if(d.b&&['trend','ray','extended','arrow','rect','ellipse','fib'].includes(d.type))pts.push([this.xOf(d.b.i),this.toY(mainP,d.b.v)]);
        for(const[hx,hy]of pts){ctx.fillRect(hx-4,hy-4,8,8);ctx.strokeRect(hx-3.5,hy-3.5,7,7)}
      }
    }
    if(this._measure&&this._measure.b){
      const a=this._measure.a,b=this._measure.b;
      const x1=this.xOf(a.i),y1=this.toY(mainP,a.v),x2=this.xOf(b.i),y2=this.toY(mainP,b.v);
      const up2=b.v>=a.v,mc=up2?T.up:T.down;
      ctx.fillStyle=mc+'1c';
      ctx.fillRect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1)||1,Math.abs(y2-y1)||1);
      ctx.strokeStyle=mc;ctx.lineWidth=1;
      ctx.strokeRect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1)||1,Math.abs(y2-y1)||1);
      const dBar=Math.round(b.i-a.i);
      const info=(up2?'+':'')+this.fmtPx(b.v-a.v)+'  ('+(up2?'+':'')+((b.v/a.v-1)*100).toFixed(2)+'%)  ·  '+dBar+' bar · '+fmtDur(Math.abs(dBar)*this.tfSec);
      ctx.font='600 11px '+T.mono;
      const iw=ctx.measureText(info).width;
      const bx=clamp((x1+x2)/2-iw/2-8,4,pw-iw-20),by=Math.max(4,Math.min(y1,y2)-26);
      ctx.fillStyle=mc;
      ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(bx,by,iw+16,20,5);else ctx.rect(bx,by,iw+16,20);
      ctx.fill();
      ctx.fillStyle='#fff';ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(info,bx+8,by+10);
    }

    if(!c)return;
    const i=Math.round(c.i);
    const xr=this.xOf(i);
    if(xr<-2||xr>pw+2)return;
    const x=clamp(this.hair(xr),.5,pw-.5);
    const y=this.hair(clamp(c.y,0,ph));
    ctx.setLineDash([3,4]);ctx.strokeStyle=T.muted+'99';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,ph);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(pw,y);ctx.stroke();
    ctx.setLineDash([]);
    const pane=this._paneAt(c.y);
    ctx.font='600 11px '+T.mono;
    const pTxt=this.fmtPrice(this.toV(pane,clamp(c.y,pane.y0,pane.y1)));
    ctx.fillStyle=T.accent;
    const tw=ctx.measureText(pTxt).width;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(pw+2,this.crisp(y-9),tw+12,18,4);else ctx.rect(pw+2,this.crisp(y-9),tw+12,18);
    ctx.fill();
    ctx.fillStyle='#fff';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(pTxt,pw+8,y);
    const tTxt=this.fmtTime(this.timeOfIndex(i));
    const tw2=ctx.measureText(tTxt).width;
    ctx.fillStyle=T.accent;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(this.crisp(x-tw2/2-6),ph+2,tw2+12,18,4);else ctx.rect(this.crisp(x-tw2/2-6),ph+2,tw2+12,18);
    ctx.fill();
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(tTxt,x,ph+11);
  }

  /* ===== etkileşim ===== */
  _bind(){
    const wrap=this.wrap;
    const pos=e=>{const r=this._rect||{left:0,top:0};return{x:e.clientX-r.left,y:e.clientY-r.top}};

    wrap.addEventListener('pointerdown',e=>{
      if(this.hooks.onFocus)this.hooks.onFocus();
      this._rect=wrap.getBoundingClientRect();
      wrap.setPointerCapture&&wrap.setPointerCapture(e.pointerId);
      const p=pos(e);this._pointers.set(e.pointerId,p);
      if(this._pointers.size===2){
        const[a,b]=[...this._pointers.values()];
        this._pinch={d:Math.hypot(a.x-b.x,a.y-b.y),mid:(a.x+b.x)/2};this._drag=null;
        return;
      }
      const pw=this.plotW(),ph=this.plotH(),main=this.panes[0];
      if(p.x>pw&&p.y<=ph){
        this._drag={mode:'yscale',x:p.x,y:p.y,paneKey:this._paneKey(this._paneAt(p.y))};
        wrap.style.cursor='ns-resize';this.cross=null;this._reqOverlay();return;
      }
      if(p.y>ph&&p.x<=pw){
        this._drag={mode:'xscale',x:p.x,y:p.y};
        wrap.style.cursor='ew-resize';this.cross=null;this._reqOverlay();return;
      }
      /* künye tıklaması */
      const lr=this._labelRects.find(r2=>p.x>=r2.x&&p.x<=r2.x+r2.w&&p.y>=r2.y&&p.y<=r2.y+r2.h);
      if(lr&&this.tool==='cursor'){
        this._drag={mode:'noop',x:p.x,y:p.y};
        if(this.hooks.onIndClick)this.hooks.onIndClick(lr.id,e.clientX,e.clientY);
        return;
      }
      const inMain=main&&p.x<=pw&&p.y>=main.y0&&p.y<=main.y1;
      if(this.tool==='measure'&&inMain){
        this._measure={a:this._ptOf(p),b:null};
        this._drag={mode:'measure',x:p.x,y:p.y};
        this.cross=null;this._reqOverlay();return;
      }
      if(this.tool==='eraser'){
        const h=this._hitTest(p.x,p.y);
        if(h)this._removeDrawing(h.id);
        this._drag={mode:'erase',x:p.x,y:p.y};
        return;
      }
      if(this.tool!=='cursor'&&inMain){
        if(this.tool==='alarm'){
          const pt=this._ptOf(p);
          const d={id:++this._did,type:'alarm',a:pt,color:'#ff9800'};
          this.drawings.push(d);this.setTool('cursor');this.requestDraw();this.emitChange();
          this._drag={mode:'noop',x:p.x,y:p.y};
          return;
        }
        this._startDraft(p);
        this._drag={mode:'draw',x:p.x,y:p.y};
        this.cross=null;this._reqOverlay();return;
      }
      const h=this._hitTest(p.x,p.y);
      if(h){
        this.sel=h.id;
        const d=this.drawings.find(x=>x.id===h.id);
        this._grab={id:h.id,point:h.point,start:this._ptOf(p),orig:{a:{...d.a},b:d.b?{...d.b}:null}};
        this._drag={mode:h.point?'editPoint':'moveDraw',x:p.x,y:p.y,clickXY:[e.clientX,e.clientY]};
        this._reqOverlay();return;
      }
      if(this.sel!=null){this.sel=null;this._reqOverlay();if(this.hooks.onSelect)this.hooks.onSelect(null)}
      this._drag={mode:'pan',x:p.x,y:p.y};
      wrap.classList.add('panning');
    });
    wrap.addEventListener('pointermove',e=>{
      const p=pos(e);
      if(this._pointers.has(e.pointerId))this._pointers.set(e.pointerId,p);
      if(this._pinch&&this._pointers.size===2){
        const[a,b]=[...this._pointers.values()];
        const d=Math.hypot(a.x-b.x,a.y-b.y),mid=(a.x+b.x)/2;
        if(this._pinch.d>0)this.zoomAt(mid,d/this._pinch.d);
        this._pinch={d,mid};
        return;
      }
      if(this._drag){
        const D=this._drag,dx=p.x-D.x,dy=p.y-D.y;
        if(D.mode==='yscale'){if(dy)this.scaleY(D.paneKey,dy)}
        else if(D.mode==='xscale'){if(dx)this.scaleX(dx)}
        else if(D.mode==='draw'){if(this.draft)this.draft.b=this._ptOf(p);this._reqOverlay()}
        else if(D.mode==='measure'){if(this._measure)this._measure.b=this._ptOf(p);this._reqOverlay()}
        else if(D.mode==='erase'){const h=this._hitTest(p.x,p.y);if(h)this._removeDrawing(h.id)}
        else if(D.mode==='moveDraw'||D.mode==='editPoint'){
          const d=this.drawings.find(x=>x.id===this._grab.id);
          if(d){
            const cur=this._ptOf(p),g=this._grab;
            if(D.mode==='editPoint'){
              if(d.type==='alarm')d.a.v=cur.v;else d[g.point]={...cur};
            }else{
              const di=cur.i-g.start.i,dv=cur.v-g.start.v;
              if(d.type==='alarm'||d.type==='hline'){d.a={i:g.orig.a.i,v:g.orig.a.v+dv}}
              else{
                d.a={i:g.orig.a.i+di,v:g.orig.a.v+dv};
                if(g.orig.b)d.b={i:g.orig.b.i+di,v:g.orig.b.v+dv};
              }
            }
            D.movedDraw=true;
            this.requestDraw();
          }
        }
        else if(D.mode==='pan'){
          if(dx)this.pan(dx);
          if(dy&&this.manual.main)this.shiftY('main',dy);
          this.cross=null;
        }
        D.x=p.x;D.y=p.y;
        this._reqOverlay();
        return;
      }
      const pw=this.plotW(),ph=this.plotH();
      if(p.x>pw&&p.y<=ph)wrap.style.cursor='ns-resize';
      else if(p.y>ph&&p.x<=pw)wrap.style.cursor='ew-resize';
      else if(this.tool==='cursor'&&(this._labelRects.some(r2=>p.x>=r2.x&&p.x<=r2.x+r2.w&&p.y>=r2.y&&p.y<=r2.y+r2.h)||this._hitTest(p.x,p.y)))wrap.style.cursor='pointer';
      else wrap.style.cursor='';
      this.cross=(p.x<=pw&&p.y<=ph)?{x:p.x,y:p.y,i:this.iOf(p.x)}:null;
      this._reqOverlay();
    });
    const up=e=>{
      this._pointers.delete(e.pointerId);
      if(this._pointers.size<2)this._pinch=null;
      if(this._pointers.size===0){
        const D=this._drag;
        if(D){
          if(D.mode==='draw')this._commitDraft();
          if(D.mode==='measure'){this._measure=null;this.setTool('cursor')}
          if(D.mode==='erase')this.setTool('cursor');
          if((D.mode==='moveDraw'||D.mode==='editPoint')){
            if(D.movedDraw)this.emitChange();
            else if(this.hooks.onSelect){const d=this.drawings.find(x=>x.id===this.sel);if(d)this.hooks.onSelect(d,D.clickXY)}
          }
        }
        this._drag=null;this._grab=null;
        wrap.classList.remove('panning');
        wrap.style.cursor='';
        this._reqOverlay();
      }
    };
    wrap.addEventListener('pointerup',up);
    wrap.addEventListener('pointercancel',up);
    wrap.addEventListener('pointerleave',()=>{if(!this._drag){this.cross=null;this._reqOverlay()}});

    wrap.addEventListener('wheel',e=>{
      e.preventDefault();
      const p=pos(e);
      this.zoomAt(p.x,Math.exp(-e.deltaY*.0016));
      if(this.cross)this.cross={x:p.x,y:p.y,i:this.iOf(p.x)};
    },{passive:false});

    wrap.addEventListener('dblclick',e=>{
      const p=pos(e),pw=this.plotW(),ph=this.plotH();
      if(p.x>pw&&p.y<=ph)this.resetScale(this._paneAt(p.y));
      else this.fit();
    });

    if(typeof window!=='undefined')window.addEventListener('keydown',e=>{
      if(this.hooks.isActive&&!this.hooks.isActive())return;
      if(e.target&&/select|input|textarea/i.test(e.target.tagName||''))return;
      if(e.key==='Delete'||e.key==='Backspace'){
        if(this.sel!=null){this._removeDrawing(this.sel);e.preventDefault()}
        return;
      }
      if(e.key==='Escape'){
        this.draft=null;this._measure=null;this.sel=null;
        if(this.tool!=='cursor')this.setTool('cursor');else this._reqOverlay();
        return;
      }
      const stepPx=this.plotW()*.1;
      if(e.key==='ArrowLeft')this.pan(stepPx);
      else if(e.key==='ArrowRight')this.pan(-stepPx);
      else if(e.key==='+'||e.key==='=')this.zoomAt(this.plotW()/2,1.18);
      else if(e.key==='-'||e.key==='_')this.zoomAt(this.plotW()/2,1/1.18);
      else if(e.key==='Home')this.fit();
      else return;
      e.preventDefault();
    });
  }
}

/* ---------- YATAY popup sistemi ---------- */
let _pop=null,_popClose=null;
function closePop(){
  if(_pop){_pop.remove();_pop=null}
  if(_popClose){document.removeEventListener('mousedown',_popClose,true);_popClose=null}
}
function hpop(x,y,build){
  closePop();
  const el=document.createElement('div');el.className='hpop';
  document.body.appendChild(el);
  build(el);
  const r=el.getBoundingClientRect();
  el.style.left=clamp(x,8,(window.innerWidth||1200)-r.width-8)+'px';
  el.style.top=clamp(y,8,(window.innerHeight||800)-r.height-8)+'px';
  _pop=el;
  _popClose=ev=>{if(!el.contains(ev.target))closePop()};
  document.addEventListener('mousedown',_popClose,true);
  return el;
}
function hpopAt(anchor,build){
  const r=anchor.getBoundingClientRect();
  return hpop(r.left,r.bottom+6,build);
}
function chip(label,on,fn,cls){
  const b=document.createElement('button');
  b.className='chip'+(on?' on':'')+(cls?' '+cls:'');
  b.textContent=label;b.onclick=fn;
  return b;
}
function hlbl(t){const s=document.createElement('span');s.className='hlbl';s.textContent=t;return s}

/* ---------- modal (yatay geniş sayfa) ---------- */
function openSheet(build){
  ovl.innerHTML='';ovl.classList.add('show');
  const sh=document.createElement('div');sh.className='sheet';
  ovl.appendChild(sh);build(sh);
  ovl.onmousedown=e=>{if(e.target===ovl)closeSheet()};
  return sh;
}
function closeSheet(){ovl.classList.remove('show');ovl.innerHTML=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeSheet();closePop()}});

/* ---------- panel ---------- */
function makePanel(sym,tf){
  const id=++_pid;
  const cell=document.createElement('div');cell.className='cell';
  const wrap=document.createElement('div');wrap.className='cwrap';
  const lg=document.createElement('div');lg.className='lg';
  cell.appendChild(wrap);cell.appendChild(lg);
  gridEl.appendChild(cell);
  const panel={id,cell,wrap,lg,symbol:sym,tf,motor:null};
  panel.motor=new Motor(wrap,{
    isActive:()=>activeId===id,
    onFocus:()=>setActive(id),
    onDraw:m=>{if(activeId===id)updateStat(m)},
    onLegend:(m,i)=>renderLegend(panel,i),
    onTool:t=>{if(activeId===id)syncTools(t)},
    onChange:()=>scheduleAutosave(),
    onPrompt:q=>{try{return window.prompt(q)||''}catch(e){return ''}},
    onSelect:(d,xy)=>{if(d&&xy)drawEditPop(panel,d,xy[0],xy[1]);},
    onIndClick:(indId,cx,cy)=>indEditPop(panel,indId,cx,cy),
  });
  cell.addEventListener('mousedown',()=>setActive(id));
  loadPanelData(panel);
  return panel;
}
function loadPanelData(panel){
  const meta=metaOf(panel.symbol);
  const tfo=TIMEFRAMES.find(t=>t.k===panel.tf);
  panel.motor.setData(panel.symbol,tfo.sec,genData(panel.symbol,panel.tf),meta?meta.prec:2);
}
function setActive(id){
  if(activeId===id)return;
  activeId=id;
  panels.forEach(p=>p.cell.classList.toggle('act',p.id===id));
  syncToolbar();
}
function setLayout(n){
  layoutN=n;
  gridEl.className='l'+n;
  while(panels.length>n){const p=panels.pop();p.motor.destroy();p.cell.remove()}
  while(panels.length<n){
    const src2=panels[0];
    panels.push(makePanel(src2?src2.symbol:'BTCUSD',src2?src2.tf:'1D'));
  }
  if(!panels.find(p=>p.id===activeId))activeId=panels[0].id;
  panels.forEach(p=>{p.cell.classList.toggle('act',p.id===activeId);p.motor.resize()});
  document.querySelectorAll('#laySeg button').forEach(b=>b.classList.toggle('on',+b.dataset.n===n));
  syncToolbar();scheduleAutosave();
}
function renderLegend(panel,i){
  const m=panel.motor,b=m.data[i];
  if(!b){panel.lg.textContent='';return}
  const prev=m.data[i-1]||b;
  const chg=prev.close?((b.close-prev.close)/prev.close*100):0;
  const cls=chg>=0?'up':'down',sign=chg>=0?'+':'';
  const tfo=TIMEFRAMES.find(t=>t.k===panel.tf);
  panel.lg.innerHTML=
    `<span class="s">${panel.symbol}</span><span class="tfx">${tfo?tfo.n:panel.tf}</span>`+
    `A <span class="v">${m.fmtPx(b.open)}</span> Y <span class="v">${m.fmtPx(b.high)}</span> `+
    `D <span class="v">${m.fmtPx(b.low)}</span> K <span class="v">${m.fmtPx(b.close)}</span> `+
    `<span class="chg ${cls}">${sign}${chg.toFixed(2)}%</span>`;
}
function updateStat(m){
  statEl.innerHTML=`<b>${m.lastDrawMs.toFixed(1)} ms</b> · ${m.lastDrawn} bar`;
  statR.textContent=`${m.sym} · ${m.inds.length} gösterge · ${m.drawings.length} çizim`;
  const cnt=panels.reduce((s,p)=>s+p.motor.drawings.filter(d=>d.type==='alarm').length,0);
  document.getElementById('alarmCnt').textContent=cnt?cnt:'';
}

/* gösterge düzenleme (yatay popup) */
function indEditPop(panel,indId,cx,cy){
  const m=panel.motor,inst=m.inds.find(i=>i.id===indId);
  if(!inst)return;
  const def=REGISTRY[inst.key];
  hpop(cx,cy+10,el=>{
    el.appendChild(hlbl(inst.short));
    (def.params||[]).forEach(pd=>{
      const wrap2=document.createElement('label');
      wrap2.style.cssText='display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)';
      wrap2.textContent=pd.l;
      let inp;
      if(pd.t==='num'){inp=document.createElement('input');inp.type='number';inp.step=pd.step||1;inp.value=inst.params[pd.k]}
      else if(pd.t==='color'){inp=document.createElement('input');inp.type='color';inp.value=inst.params[pd.k]}
      else{
        inp=document.createElement('select');
        const opts=pd.t==='src'?['close','open','high','low','hl2','hlc3','ohlc4']:(pd.opts||[]);
        opts.forEach(o=>{const op=document.createElement('option');op.value=op.textContent=o;inp.appendChild(op)});
        inp.value=inst.params[pd.k];
      }
      inp.onchange=()=>{
        const v=pd.t==='num'?parseFloat(inp.value):inp.value;
        m.updateInd(indId,{[pd.k]:v});
      };
      wrap2.appendChild(inp);
      el.appendChild(wrap2);
    });
    el.appendChild(chip('Kaldır',false,()=>{m.removeInd(indId);closePop()},'danger'));
  });
}

function applyTheme(key){
  const th=THEMES[key]||THEMES.classic;
  Object.entries(th.v).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
  document.documentElement.style.setProperty('--grid',th.grid);
  currentThemeKey=key;
  if(currentAccent)setAccent(currentAccent);
  panels.forEach(p=>{p.motor.style.bg=th.bg;p.motor.style.grid=th.grid;p.motor.requestDraw()});
  scheduleAutosave();
}

  currentAccent=c;
  document.documentElement.style.setProperty('--accent',c);
  document.documentElement.style.setProperty('--accent-soft',c+'22');
  panels.forEach(p=>p.motor.requestDraw());
  scheduleAutosave();
}

  SYMBOLS.forEach(s=>{
    if(s.c!==lastCat){lastCat=s.c;const h=document.createElement('div');h.className='wcat';h.textContent=s.c;wl.appendChild(h)}
    const d=genData(s.s,'1D');

    const row=document.createElement('div');row.className='wrow';row.dataset.sym=s.s;
    row.innerHTML=`<span class="ws">${s.s}</span><span class="wl">${last.close.toLocaleString('tr-TR',{minimumFractionDigits:s.prec,maximumFractionDigits:s.prec})}</span><span class="wc ${chg>=0?'up':'down'}">${chg>=0?'+':''}${chg.toFixed(2)}%</span>`;
    row.onclick=()=>{const p=active();p.symbol=s.s;loadPanelData(p);syncToolbar();refreshWatchActive();scheduleAutosave()};
    wl.appendChild(row);
  });
}
function refreshWatchActive(){
  const p=active();
  document.querySelectorAll('.wrow').forEach(r=>r.classList.toggle('on',r.dataset.sym===p.symbol));
}

/* sol araç çubuğu */

 ['trend','Trend çizgisi','<svg viewBox="0 0 24 24"><path d="M4 19L20 5"/><circle cx="4" cy="19" r="1.6"/><circle cx="20" cy="5" r="1.6"/></svg>'],
 ['ray','Işın','<svg viewBox="0 0 24 24"><path d="M4 19L17 8"/><path d="M14 5h6v6"/><circle cx="4" cy="19" r="1.6"/></svg>'],

 ['arrow','Ok','<svg viewBox="0 0 24 24"><path d="M4 19L18 7"/><path d="M12 5h7v7"/></svg>'],

];
const toolsEl=document.getElementById('tools');
TOOLS.forEach(([k,title,svg])=>{
  const b=document.createElement('button');
  b.className='tool';b.title=title;b.dataset.tool=k;b.innerHTML=svg;
  b.onclick=()=>active().motor.setTool(k);
  toolsEl.appendChild(b);
});
const sep=document.createElement('div');sep.className='sep';toolsEl.appendChild(sep);
const eyeBtn=document.createElement('button');
eyeBtn.className='tool';eyeBtn.title='Çizimleri gizle/göster';
eyeBtn.innerHTML='<svg viewBox="0 0 24 24"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"/><circle cx="12" cy="12" r="2.5"/></svg>';
eyeBtn.onclick=()=>{const m=active().motor;m.hideDraw=!m.hideDraw;eyeBtn.classList.toggle('on',m.hideDraw);m.requestDraw();scheduleAutosave()};
toolsEl.appendChild(eyeBtn);
const trashBtn=document.createElement('button');
trashBtn.className='tool';trashBtn.title='Tüm çizimleri sil (aktif panel)';
trashBtn.innerHTML='<svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M7 7l1 13h8l1-13"/></svg>';
trashBtn.onclick=()=>active().motor.clearDrawings();
toolsEl.appendChild(trashBtn);
function syncTools(t){[...toolsEl.querySelectorAll('.tool')].forEach(b=>{if(b.dataset.tool)b.classList.toggle('on',b.dataset.tool===t)})}

/* ---------- çalışma alanı (kaydet/yükle) ---------- */
function serialize(){
  return JSON.stringify({
    v:2,theme:currentThemeKey,accent:currentAccent,layout:layoutN,
    panels:panels.map(p=>({symbol:p.symbol,tf:p.tf,view:p.motor.serializeView()}))
  });
}
function applyState(json){
  let st;try{st=JSON.parse(json)}catch(e){return false}
  if(!st||!st.panels)return false;
  applyTheme(st.theme||'classic');
  if(st.accent)setAccent(st.accent);
  setLayout(st.layout||st.panels.length||1);
  st.panels.slice(0,panels.length).forEach((ps,i)=>{
    const p=panels[i];
    p.symbol=ps.symbol;p.tf=ps.tf;
    loadPanelData(p);
    p.motor.applyView(ps.view);
  });
  syncToolbar();refreshWatchActive();
  return true;
}
let _asT=0;
function scheduleAutosave(){
  clearTimeout(_asT);
  _asT=setTimeout(()=>{try{Store.set('c2:auto',serialize())}catch(e){}},700);
}
function wsList(){try{return JSON.parse(Store.get('c2:wslist')||'[]')}catch(e){return[]}}
document.getElementById('wsBtn').onclick=e=>{
  hpopAt(e.currentTarget,el=>{
    el.appendChild(hlbl('çalışma alanı'));
    const inp=document.createElement('input');inp.type='text';inp.placeholder='İsim…';
    el.appendChild(inp);
    el.appendChild(chip('Kaydet',false,()=>{
      const name=(inp.value||'').trim();if(!name)return;
      Store.set('c2:ws:'+name,serialize());
      const l=wsList();if(!l.includes(name))l.push(name);
      Store.set('c2:wslist',JSON.stringify(l));
      closePop();
    }));
    const l=wsList();
    if(l.length){
      const br=document.createElement('div');br.className='grow';el.appendChild(br);
      l.forEach(name=>{
        el.appendChild(chip('▶ '+name,false,()=>{const j=Store.get('c2:ws:'+name);if(j)applyState(j);closePop()}));
        el.appendChild(chip('✕',false,()=>{
          Store.del('c2:ws:'+name);
          Store.set('c2:wslist',JSON.stringify(wsList().filter(n=>n!==name)));
          closePop();
        },'danger'));
      });
    }
    const br2=document.createElement('div');br2.className='grow';el.appendChild(br2);
    el.appendChild(chip('🧹 Temiz başlat (sıfırla)',false,()=>{
      Store.del('c2:auto');
      panels.forEach(p=>{p.motor.destroy();p.cell.remove()});
      panels=[];activeId=null;
      boot(true);
      closePop();
    },'danger'));
  });
};

/* ---------- açılış ---------- */
function boot(fresh){
  gridEl.className='l1';layoutN=1;
  panels=[makePanel('BTCUSD','1D')];
  activeId=panels[0].id;
  panels[0].cell.classList.add('act');
  const auto=fresh?null:Store.get('c2:auto');
  if(auto)applyState(auto);
  syncToolbar();refreshWatchActive();syncTools('cursor');
}
buildWatch();
applyTheme(Store.get('c2:theme')||'classic');
boot(false);

/* testler için */
window.__app={get panels(){return panels},active,setLayout,applyTheme,setAccent,serialize,applyState,Store,boot};
window.__Motor=Motor;
window.__REGISTRY=REGISTRY;
window.__CATEGORIES=CATEGORIES;
window.__genData=genData;
window.__SYMBOLS=SYMBOLS;
</script>
