<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chart · Motor</title>
<style>
  :root{
    --bg:#131722;--panel:#1b1f2a;--panel-2:#1e222d;--border:#2a2e39;
    --text:#d1d4dc;--muted:#787b86;--muted-2:#5d606b;
    --up:#26a69a;--down:#ef5350;--accent:#2962ff;--accent-soft:#2962ff22;--hover:#2a2e39;
    --grid:#1c2030;
    --mono:ui-monospace,"JetBrains Mono","Cascadia Mono",Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;overflow:hidden;font-size:13px}
  button{font-family:var(--sans)}

  /* ===== üst çubuk ===== */
  #topbar{display:flex;align-items:center;gap:8px;height:46px;padding:0 10px;background:var(--panel);border-bottom:1px solid var(--border);flex:none;overflow-x:auto;overflow-y:visible}
  .brand{display:flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.12em;font-size:14px;margin-right:2px;white-space:nowrap}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 9px var(--accent)}
  .tb{background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-weight:600;font-size:12px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
  .tb:hover{border-color:var(--accent);}
  .tb.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .tb .cap{font-size:10px;color:var(--muted);font-weight:600}
  .seg{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex:none}
  .seg button{background:transparent;border:0;color:var(--muted);font-weight:600;font-size:12px;padding:6px 9px;cursor:pointer;position:relative;white-space:nowrap}
  .seg button+button{border-left:1px solid var(--border)}
  .seg button:hover{color:var(--text);background:var(--hover)}
  .seg button.on{color:var(--text)}
  .seg button.on::after{content:"";position:absolute;left:7px;right:7px;bottom:3px;height:2px;border-radius:2px;background:var(--accent)}
  #stat{margin-left:auto;font:10.5px var(--mono);color:var(--muted);white-space:nowrap;text-align:right;line-height:1.3}
  #stat b{color:var(--accent)}

  /* ===== orta bölge ===== */
  #mid{flex:1;display:flex;min-height:0}
  #tools{width:42px;flex:none;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:7px 0;gap:2px;overflow-y:auto}
  #tools .sep{width:22px;height:1px;background:var(--border);margin:4px 0;flex:none}
  .tool{width:30px;height:30px;border-radius:7px;border:0;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex:none}
  .tool:hover{background:var(--hover);color:var(--text)}
  .tool.on{background:var(--accent-soft);color:var(--accent)}
  .tool svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

  #grid{flex:1;display:grid;gap:4px;padding:4px;min-width:0;background:var(--bg)}
  #grid.l1{grid-template-columns:1fr;grid-template-rows:1fr}
  #grid.l2{grid-template-columns:1fr 1fr;grid-template-rows:1fr}
  #grid.l4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
  .cell{position:relative;border:1px solid var(--border);border-radius:8px;overflow:hidden;min-width:0;min-height:0;background:var(--bg)}
  .cell.act{border-color:var(--accent)}
  .cwrap{position:absolute;inset:0;cursor:crosshair;touch-action:none}
  .cwrap.panning{cursor:grabbing}
  .cwrap canvas{position:absolute;inset:0;display:block}
  .lg{position:absolute;z-index:3;top:8px;left:10px;font:11.5px var(--mono);color:var(--muted);background:color-mix(in srgb,var(--bg) 88%,transparent);border:1px solid var(--border);border-radius:7px;padding:4px 8px;pointer-events:none;max-width:calc(100% - 20px);white-space:nowrap;overflow:hidden}
  .lg .s{color:var(--text);font-weight:700;font-family:var(--sans);margin-right:5px}
  .lg .tfx{color:var(--muted-2);margin-right:6px}
  .lg .v{color:var(--text)}
  .lg .chg.up{color:var(--up)} .lg .chg.down{color:var(--down)}

  /* ===== izleme listesi ===== */
  #watch{width:210px;flex:none;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
  #watch h3{font-size:10px;letter-spacing:.14em;color:var(--muted-2);padding:10px 12px 6px;text-transform:uppercase}
  #wlist{flex:1;overflow-y:auto}
  .wcat{font-size:10px;color:var(--muted-2);padding:7px 12px 3px;letter-spacing:.08em}
  .wrow{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer}
  .wrow:hover{background:var(--hover)}
  .wrow.on{background:var(--accent-soft)}
  .wrow .ws{font-weight:700;font-size:12px;width:64px}
  .wrow .wl{font:11px var(--mono);margin-left:auto;text-align:right}
  .wrow .wc{font:10.5px var(--mono);width:52px;text-align:right}
  .wc.up{color:var(--up)} .wc.down{color:var(--down)}
  @media(max-width:980px){#watch{display:none}}

  /* ===== durum çubuğu ===== */
  #status{height:24px;flex:none;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 12px;font-size:11px;color:var(--muted)}
  #status .ok{color:var(--up)}

  /* ===== YATAY popup (ayırt edici tasarım) ===== */
  .hpop{position:fixed;z-index:60;background:var(--panel);border:1px solid var(--border);border-radius:10px;box-shadow:0 10px 34px #000a;padding:8px 10px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;max-width:min(92vw,760px)}
  .hpop .hlbl{font-size:10px;letter-spacing:.1em;color:var(--muted-2);text-transform:uppercase;margin-right:2px;white-space:nowrap}
  .chip{background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
  .chip:hover{border-color:var(--accent)}
  .chip.on{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .chip.danger:hover{border-color:var(--down);color:var(--down)}
  .hpop input[type=number]{width:64px;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 7px;font:12px var(--mono)}
  .hpop input[type=text]{width:130px;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 8px;font-size:12px}
  .hpop input[type=color]{width:30px;height:26px;border:1px solid var(--border);border-radius:6px;background:var(--panel-2);padding:2px;cursor:pointer}
  .hpop select{background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:5px 7px;font-size:12px}
  .hpop .sw{width:20px;height:20px;border-radius:6px;border:2px solid transparent;cursor:pointer}
  .hpop .sw.on{border-color:#fff}
  .hpop .grow{flex-basis:100%;height:0}
  .hpop .kv{font:11px var(--mono);color:var(--muted)}

  /* ===== YATAY modal (geniş sayfa) ===== */
  #ovl{position:fixed;inset:0;background:#0009;z-index:50;display:none;align-items:flex-start;justify-content:center;padding-top:8vh}
  #ovl.show{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--border);border-radius:12px;width:min(880px,94vw);max-height:66vh;display:flex;flex-direction:column;box-shadow:0 18px 60px #000c}
  .sheet header{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
  .sheet header h2{font-size:14px;font-weight:700;letter-spacing:.02em}
  .sheet header input[type=text]{flex:1;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-size:13px}
  .sheet header .x{margin-left:auto;background:transparent;border:0;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px}
  .sheet header .x:hover{color:var(--text)}
  .cats{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
  .sheet .body{overflow-y:auto;padding:12px 14px}
  .cols{display:grid;grid-template-columns:repeat(auto-fill,minmax(205px,1fr));gap:7px}
  .item{position:relative;display:flex;flex-direction:column;align-items:flex-start;gap:5px;background:var(--panel-2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;cursor:pointer;text-align:left;min-height:58px}
  .item:hover{border-color:var(--accent)}
  .item.on{border-color:var(--accent);background:var(--accent-soft)}
  .item .sh{font:700 10px var(--mono);color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent);border-radius:5px;padding:1px 6px;max-width:calc(100% - 26px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item.on .sh{background:var(--accent);color:#fff}
  .item .nm{font-size:12px;line-height:1.35;color:var(--text);white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .item .tick{position:absolute;top:7px;right:9px;color:var(--accent);font-weight:800;font-size:12px}
  .item .sub{font-size:10px;color:var(--muted)}
  /* sembol modalı: satır düzeni korunur */
  .item.sym{flex-direction:row;align-items:center;gap:9px;min-height:0}
  .item.sym .sh{width:64px;max-width:none;text-align:center;flex:none}
  .item.sym .nm{-webkit-line-clamp:1}

  /* tema diline uygun ince kaydırma çubukları */
  *{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  *::-webkit-scrollbar{width:8px;height:8px}
  *::-webkit-scrollbar-track{background:transparent}
  *::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  *::-webkit-scrollbar-thumb:hover{background:var(--muted-2)}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand"><span class="dot"></span>CHART</div>
  <button class="tb" id="symBtn"><b id="symLbl">—</b><span class="cap" id="symEx"></span></button>
  <div class="seg" id="tfSeg"></div>
  <button class="tb" id="typeBtn">Mum</button>
  <button class="tb" id="maBtn">MA</button>
  <button class="tb" id="indBtn">ƒ Göstergeler</button>
  <button class="tb" id="logBtn">log</button>
  <button class="tb" id="alarmBtn">⏰ <span id="alarmCnt"></span></button>
  <div class="seg" id="laySeg"></div>
  <button class="tb" id="styleBtn">◧ Görünüm</button>
  <button class="tb" id="wsBtn">▤ Çalışma Alanı</button>
  <div id="stat">—</div>
</div>

<div id="mid">
  <div id="tools" role="toolbar" aria-label="Çizim araçları"></div>
  <div id="grid" class="l1"></div>
  <div id="watch"><h3>İzleme Listesi</h3><div id="wlist"></div></div>
</div>

<div id="status">
  <span class="ok">● MOTOR</span><span>kendi çizim çekirdeğimiz · harici kütüphane yok</span>
  <span style="margin-left:auto" id="statR"></span>
</div>

<div id="ovl"></div>

<script>
'use strict';
/* ============================================================
   ÇEKİRDEK: semboller, veri, indikatör matematiği + REGISTRY
   (kütüphaneli Chart'tan olduğu gibi taşındı — motor-bağımsız)
   ============================================================ */
const SYMBOLS=[
  {s:'BTCUSD',n:'Bitcoin',c:'Kripto',ex:'Crypto',base:64000,prec:2,vol:1.8},
  {s:'ETHUSD',n:'Ethereum',c:'Kripto',ex:'Crypto',base:3450,prec:2,vol:2.1},
  {s:'SOLUSD',n:'Solana',c:'Kripto',ex:'Crypto',base:148,prec:2,vol:3.0},
  {s:'BNBUSD',n:'BNB',c:'Kripto',ex:'Crypto',base:585,prec:2,vol:1.9},
  {s:'XRPUSD',n:'XRP',c:'Kripto',ex:'Crypto',base:0.61,prec:4,vol:2.6},
  {s:'AAPL',n:'Apple Inc.',c:'ABD Hisse',ex:'NASDAQ',base:221,prec:2,vol:1.1},
  {s:'MSFT',n:'Microsoft',c:'ABD Hisse',ex:'NASDAQ',base:432,prec:2,vol:1.0},
  {s:'NVDA',n:'NVIDIA',c:'ABD Hisse',ex:'NASDAQ',base:123,prec:2,vol:1.9},
  {s:'TSLA',n:'Tesla',c:'ABD Hisse',ex:'NASDAQ',base:248,prec:2,vol:2.4},
  {s:'AMZN',n:'Amazon',c:'ABD Hisse',ex:'NASDAQ',base:186,prec:2,vol:1.3},
  {s:'SPX',n:'S&P 500',c:'ABD Endeks',ex:'INDEX',base:5500,prec:2,vol:0.7},
  {s:'NDX',n:'Nasdaq 100',c:'ABD Endeks',ex:'INDEX',base:19500,prec:2,vol:0.9},
  {s:'DJI',n:'Dow Jones',c:'ABD Endeks',ex:'INDEX',base:40000,prec:2,vol:0.6},
  {s:'THYAO',n:'Türk Hava Yolları',c:'BIST',ex:'BIST',base:298,prec:2,vol:1.7},
  {s:'GARAN',n:'Garanti BBVA',c:'BIST',ex:'BIST',base:118,prec:2,vol:1.5},
  {s:'ASELS',n:'Aselsan',c:'BIST',ex:'BIST',base:56,prec:2,vol:1.8},
  {s:'BIMAS',n:'BİM Mağazalar',c:'BIST',ex:'BIST',base:505,prec:2,vol:1.2},
  {s:'KCHOL',n:'Koç Holding',c:'BIST',ex:'BIST',base:192,prec:2,vol:1.4},
  {s:'EURUSD',n:'Euro / Dolar',c:'Forex',ex:'FX',base:1.08,prec:4,vol:0.5},
  {s:'USDTRY',n:'Dolar / TL',c:'Forex',ex:'FX',base:32.4,prec:3,vol:0.8},
];
const TIMEFRAMES=[{k:'1m',sec:60,n:'1m'},{k:'5m',sec:300,n:'5m'},{k:'15m',sec:900,n:'15m'},{k:'1h',sec:3600,n:'1s'},{k:'4h',sec:14400,n:'4s'},{k:'1D',sec:86400,n:'1G'},{k:'1W',sec:604800,n:'1H'},{k:'1M',sec:2592000,n:'1A'},{k:'1Y',sec:31536000,n:'1Y'}];
const BARS=360;
const metaOf=s=>SYMBOLS.find(x=>x.s===s);

/* ===== DUMMY VERİ ===== */
function hashStr(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const _cache={};
function genData(sym,tf){
  const key=sym+'|'+tf; if(_cache[key])return _cache[key];
  const meta=metaOf(sym),tfo=TIMEFRAMES.find(x=>x.k===tf),rnd=mulberry32(hashStr(key));
  const drift=(rnd()-0.45)*0.0006,volPct=(meta.vol||1)*Math.pow(tfo.sec/86400,0.5)*0.012;
  const out=[];let price=meta.base*(0.85+rnd()*0.3);
  const now=Math.floor(Date.now()/1000),start=now-BARS*tfo.sec;
  for(let i=0;i<BARS;i++){
    const t=start+i*tfo.sec,g=(rnd()+rnd()+rnd()-1.5)/1.5,ret=drift+g*volPct;
    const open=price;let close=open*(1+ret);
    const wick=Math.abs(g)*volPct*open*0.9+open*volPct*0.3*rnd();
    const high=Math.max(open,close)+wick*rnd(),low=Math.min(open,close)-wick*rnd();
    out.push({time:t,open,high,low,close,value:Math.round((0.6+rnd()*0.8)*((high-low)/open)*1e7)});price=close;
  }
  _cache[key]=out;return out;
}

/* ===== İNDİKATÖR MATEMATİĞİ ===== */
const src=(d,key)=>d.map(b=>{switch(key){case'open':return b.open;case'high':return b.high;case'low':return b.low;case'hl2':return(b.high+b.low)/2;case'hlc3':return(b.high+b.low+b.close)/3;case'ohlc4':return(b.open+b.high+b.low+b.close)/4;default:return b.close}});
function SMA(v,p){const o=Array(v.length).fill(null);let s=0;for(let i=0;i<v.length;i++){s+=v[i];if(i>=p)s-=v[i-p];if(i>=p-1)o[i]=s/p}return o}
function EMA(v,p){const o=Array(v.length).fill(null);const k=2/(p+1);let pr=null;for(let i=0;i<v.length;i++){if(i<p-1)continue;if(pr===null){let s=0;for(let j=i-p+1;j<=i;j++)s+=v[j];pr=s/p}else pr=v[i]*k+pr*(1-k);o[i]=pr}return o}
function STD(v,p){const o=Array(v.length).fill(null);for(let i=p-1;i<v.length;i++){let m=0;for(let j=i-p+1;j<=i;j++)m+=v[j];m/=p;let s=0;for(let j=i-p+1;j<=i;j++){const d=v[j]-m;s+=d*d}o[i]=Math.sqrt(s/p)}return o}
function RSI(v,p){const o=Array(v.length).fill(null);let ag=0,al=0;for(let i=1;i<v.length;i++){const c=v[i]-v[i-1],g=Math.max(c,0),l=Math.max(-c,0);if(i<=p){ag+=g;al+=l;if(i===p){ag/=p;al/=p;o[i]=100-100/(1+(al===0?100:ag/al))}}else{ag=(ag*(p-1)+g)/p;al=(al*(p-1)+l)/p;o[i]=100-100/(1+(al===0?100:ag/al))}}return o}
function MACD(v,f,s,sig){const ef=EMA(v,f),es=EMA(v,s);const m=v.map((_,i)=>(ef[i]!=null&&es[i]!=null)?ef[i]-es[i]:null);const c=m.map(x=>x==null?0:x);const sg=EMA(c,sig);const signal=m.map((x,i)=>x==null?null:sg[i]);const hist=m.map((x,i)=>(x!=null&&signal[i]!=null)?x-signal[i]:null);return{macd:m,signal,hist}}
function STOCH(d,kp,ks,dp){const rk=d.map((b,i)=>{if(i<kp-1)return null;let hh=-1e18,ll=1e18;for(let j=i-kp+1;j<=i;j++){if(d[j].high>hh)hh=d[j].high;if(d[j].low<ll)ll=d[j].low}return hh===ll?50:100*(b.close-ll)/(hh-ll)});const k=SMA(rk.map(x=>x==null?0:x),ks).map((v,i)=>rk[i]==null?null:v);const dd=SMA(k.map(x=>x==null?0:x),dp).map((v,i)=>k[i]==null?null:v);return{k,d:dd}}
function ATR(d,p){const tr=d.map((b,i)=>i===0?b.high-b.low:Math.max(b.high-b.low,Math.abs(b.high-d[i-1].close),Math.abs(b.low-d[i-1].close)));const o=Array(d.length).fill(null);let pr=null;for(let i=0;i<d.length;i++){if(i<p-1)continue;if(pr===null){let s=0;for(let j=i-p+1;j<=i;j++)s+=tr[j];pr=s/p}else pr=(pr*(p-1)+tr[i])/p;o[i]=pr}return o}
function VWAP(d){const step=d[1].time-d[0].time,intraday=step<86400;const o=Array(d.length).fill(null);let pv=0,vv=0,day=null;for(let i=0;i<d.length;i++){const dd=Math.floor(d[i].time/86400);if(intraday&&dd!==day){pv=0;vv=0;day=dd}const tp=(d[i].high+d[i].low+d[i].close)/3;pv+=tp*d[i].value;vv+=d[i].value;o[i]=vv>0?pv/vv:tp}return o}
function ICHI(d,t,k,b){const conv=per=>d.map((bb,i)=>{if(i<per-1)return null;let hh=-1e18,ll=1e18;for(let j=i-per+1;j<=i;j++){if(d[j].high>hh)hh=d[j].high;if(d[j].low<ll)ll=d[j].low}return(hh+ll)/2});return{tk:conv(t),kj:conv(k),sb:conv(b)}}
const lineT=(d,a)=>{const o=[];for(let i=0;i<d.length;i++)if(a[i]!=null)o.push({time:d[i].time,value:a[i]});return o};

/* ===== GENİŞLETİLMİŞ İNDİKATÖR MATEMATİĞİ ===== */
function SMAn(v,p){const o=Array(v.length).fill(null);let s=0,cnt=0;const buf=[];for(let i=0;i<v.length;i++){const x=v[i];buf.push(x);if(x!=null){s+=x;cnt++}if(buf.length>p){const r=buf.shift();if(r!=null){s-=r;cnt--}}if(buf.length===p&&cnt===p)o[i]=s/p}return o}
function EMAn(v,p){const o=Array(v.length).fill(null);const k=2/(p+1);let pr=null,sum=0,cnt=0;for(let i=0;i<v.length;i++){if(v[i]==null)continue;if(pr==null){sum+=v[i];cnt++;if(cnt===p){pr=sum/p;o[i]=pr}}else{pr=v[i]*k+pr*(1-k);o[i]=pr}}return o}
function RMA(v,p){const o=Array(v.length).fill(null);let pr=null,sum=0,cnt=0;for(let i=0;i<v.length;i++){if(v[i]==null)continue;if(pr==null){sum+=v[i];cnt++;if(cnt===p){pr=sum/p;o[i]=pr}}else{pr=(pr*(p-1)+v[i])/p;o[i]=pr}}return o}
function WMA(v,p){const o=Array(v.length).fill(null);const den=p*(p+1)/2;for(let i=p-1;i<v.length;i++){let s=0,ok=true;for(let j=0;j<p;j++){const x=v[i-p+1+j];if(x==null){ok=false;break}s+=x*(j+1)}if(ok)o[i]=s/den}return o}

function ZLEMA(v,p){const lag=Math.floor((p-1)/2);const s=v.map((x,i)=>i>=lag?2*x-v[i-lag]:null);return EMAn(s,p)}
function ALMA(v,p,offset,sigma){offset=offset==null?0.85:offset;sigma=sigma||6;const m=offset*(p-1),s=p/sigma;const o=Array(v.length).fill(null);for(let i=p-1;i<v.length;i++){let num=0,den=0,ok=true;for(let j=0;j<p;j++){const x=v[i-p+1+j];if(x==null){ok=false;break}const w=Math.exp(-((j-m)*(j-m))/(2*s*s));num+=x*w;den+=w}if(ok&&den)o[i]=num/den}return o}

function CCI(d,p){const tp=d.map(b=>(b.high+b.low+b.close)/3);const sm=SMAn(tp,p);const o=Array(d.length).fill(null);for(let i=p-1;i<d.length;i++){if(sm[i]==null)continue;let md=0;for(let j=i-p+1;j<=i;j++)md+=Math.abs(tp[j]-sm[i]);md/=p;o[i]=md===0?0:(tp[i]-sm[i])/(0.015*md)}return o}
function WILLR(d,p){const o=Array(d.length).fill(null);for(let i=p-1;i<d.length;i++){let hh=-1e18,ll=1e18;for(let j=i-p+1;j<=i;j++){if(d[j].high>hh)hh=d[j].high;if(d[j].low<ll)ll=d[j].low}o[i]=hh===ll?-50:-100*(hh-d[i].close)/(hh-ll)}return o}

function TSI(v,r,s){const m=v.map((x,i)=>i>0?x-v[i-1]:null),am=m.map(x=>x==null?null:Math.abs(x));const e1=EMAn(m,r),e2=EMAn(e1,s),a1=EMAn(am,r),a2=EMAn(a1,s);return v.map((_,i)=>(e2[i]!=null&&a2[i]!=null&&a2[i]!==0)?100*e2[i]/a2[i]:null)}
function AO(d){const hl2=d.map(b=>(b.high+b.low)/2),f=SMAn(hl2,5),s=SMAn(hl2,34);return d.map((_,i)=>(f[i]!=null&&s[i]!=null)?f[i]-s[i]:null)}

function TRIX(v,p){const e1=EMAn(v,p),e2=EMAn(e1,p),e3=EMAn(e2,p),o=Array(v.length).fill(null);for(let i=1;i<v.length;i++)if(e3[i]!=null&&e3[i-1]!=null&&e3[i-1]!==0)o[i]=100*(e3[i]-e3[i-1])/e3[i-1];return o}
function PPO(v,f,s){const ef=EMAn(v,f),es=EMAn(v,s);return v.map((_,i)=>(ef[i]!=null&&es[i]!=null&&es[i]!==0)?100*(ef[i]-es[i])/es[i]:null)}
function UO(d){const bp=[null],tr=[null];for(let i=1;i<d.length;i++){const pc=d[i-1].close;bp.push(d[i].close-Math.min(d[i].low,pc));tr.push(Math.max(d[i].high,pc)-Math.min(d[i].low,pc))}const avg=(p,i)=>{let sb=0,st=0;for(let j=i-p+1;j<=i;j++){sb+=bp[j];st+=tr[j]}return st===0?0:sb/st};const o=Array(d.length).fill(null);for(let i=28;i<d.length;i++)o[i]=100*(4*avg(7,i)+2*avg(14,i)+avg(28,i))/7;return o}
function FISHER(d,p){const o=Array(d.length).fill(null);let v1=0,fish=0;for(let i=p-1;i<d.length;i++){const mp=(d[i].high+d[i].low)/2;let hh=-1e18,ll=1e18;for(let j=i-p+1;j<=i;j++){const m=(d[j].high+d[j].low)/2;if(m>hh)hh=m;if(m<ll)ll=m}let x=hh===ll?0:2*((mp-ll)/(hh-ll)-0.5);v1=0.33*x+0.67*v1;v1=Math.max(-0.999,Math.min(0.999,v1));fish=0.5*Math.log((1+v1)/(1-v1))+0.5*fish;o[i]=fish}return o}
function COPPOCK(v,r1,r2,w){const a=ROC(v,r1),b=ROC(v,r2),sum=v.map((_,i)=>(a[i]!=null&&b[i]!=null)?a[i]+b[i]:null);return WMA(sum,w)}

function ADX(d,p){const pdm=[0],mdm=[0],tr=[0];for(let i=1;i<d.length;i++){const up=d[i].high-d[i-1].high,dn=d[i-1].low-d[i].low;pdm.push(up>dn&&up>0?up:0);mdm.push(dn>up&&dn>0?dn:0);tr.push(Math.max(d[i].high-d[i].low,Math.abs(d[i].high-d[i-1].close),Math.abs(d[i].low-d[i-1].close)))}const atr=RMA(tr,p),rp=RMA(pdm,p),rm=RMA(mdm,p);const pdi=Array(d.length).fill(null),mdi=Array(d.length).fill(null),dx=Array(d.length).fill(null);for(let i=0;i<d.length;i++){if(atr[i]==null||atr[i]===0)continue;pdi[i]=100*rp[i]/atr[i];mdi[i]=100*rm[i]/atr[i];const s=pdi[i]+mdi[i];dx[i]=s===0?0:100*Math.abs(pdi[i]-mdi[i])/s}const adx=RMA(dx,p);return{pdi,mdi,adx}}

function SUPERTREND(d,p,mult){const atr=ATR(d,p),o=Array(d.length).fill(null),dir=Array(d.length).fill(null);let pu=null,pl=null,trend=1;for(let i=0;i<d.length;i++){if(atr[i]==null)continue;const hl2=(d[i].high+d[i].low)/2;let up=hl2+mult*atr[i],lo=hl2-mult*atr[i];if(pu!=null){up=(up<pu||d[i-1].close>pu)?up:pu;lo=(lo>pl||d[i-1].close<pl)?lo:pl;if(trend===1&&d[i].close<pl)trend=-1;else if(trend===-1&&d[i].close>pu)trend=1}o[i]=trend===1?lo:up;dir[i]=trend;pu=up;pl=lo}return{st:o,dir}}
function VORTEX(d,p){const vp=[0],vm=[0],tr=[0];for(let i=1;i<d.length;i++){vp.push(Math.abs(d[i].high-d[i-1].low));vm.push(Math.abs(d[i].low-d[i-1].high));tr.push(Math.max(d[i].high-d[i].low,Math.abs(d[i].high-d[i-1].close),Math.abs(d[i].low-d[i-1].close)))}const o1=Array(d.length).fill(null),o2=Array(d.length).fill(null);for(let i=p;i<d.length;i++){let sp=0,sm=0,st=0;for(let j=i-p+1;j<=i;j++){sp+=vp[j];sm+=vm[j];st+=tr[j]}o1[i]=st?sp/st:null;o2[i]=st?sm/st:null}return{vip:o1,vim:o2}}
function MASS(d,p){const hl=d.map(b=>b.high-b.low),e1=EMAn(hl,9),e2=EMAn(e1,9);const ratio=d.map((_,i)=>(e1[i]!=null&&e2[i]!=null&&e2[i]!==0)?e1[i]/e2[i]:null);const o=Array(d.length).fill(null);for(let i=p-1;i<d.length;i++){let s=0,ok=true;for(let j=i-p+1;j<=i;j++){if(ratio[j]==null){ok=false;break}s+=ratio[j]}if(ok)o[i]=s}return o}
function CHOP(d,p){const tr=[0];for(let i=1;i<d.length;i++)tr.push(Math.max(d[i].high-d[i].low,Math.abs(d[i].high-d[i-1].close),Math.abs(d[i].low-d[i-1].close)));const o=Array(d.length).fill(null);for(let i=p-1;i<d.length;i++){let st=0,hh=-1e18,ll=1e18;for(let j=i-p+1;j<=i;j++){st+=tr[j];if(d[j].high>hh)hh=d[j].high;if(d[j].low<ll)ll=d[j].low}const rng=hh-ll;o[i]=rng>0?100*Math.log10(st/rng)/Math.log10(p):null}return o}

function HV(v,p){const lr=v.map((x,i)=>i>0&&v[i-1]>0?Math.log(x/v[i-1]):null),o=Array(v.length).fill(null);for(let i=p;i<v.length;i++){let m=0,c=0;for(let j=i-p+1;j<=i;j++)if(lr[j]!=null){m+=lr[j];c++}if(!c)continue;m/=c;let s=0;for(let j=i-p+1;j<=i;j++)if(lr[j]!=null){const dd=lr[j]-m;s+=dd*dd}o[i]=Math.sqrt(s/c)*Math.sqrt(252)*100}return o}

  ichimoku:{name:'Ichimoku Bulutu',short:'ICHI',overlay:true,cloud:true,params:[{k:'tenkan',l:'Tenkan',t:'num',def:9},{k:'kijun',l:'Kijun',t:'num',def:26},{k:'senkou',l:'Senkou B',t:'num',def:52},{k:'disp',l:'Kaydırma',t:'num',def:26}],

  rsi:{name:'RSI',short:'RSI',overlay:false,params:[{k:'length',l:'Uzunluk',t:'num',def:14},{k:'color',l:'Renk',t:'color',def:'#7e57c2'}],build(d,p){return[{title:`RSI ${p.length}`,type:'line',color:p.color,width:2,data:lineT(d,RSI(src(d,'close'),p.length)),guides:[{v:70,c:'#ef535066'},{v:30,c:'#26a69a66'},{v:50,c:'#5d606b44',dashed:true}]}]}},
  macd:{name:'MACD',short:'MACD',overlay:false,params:[{k:'fast',l:'Hızlı',t:'num',def:12},{k:'slow',l:'Yavaş',t:'num',def:26},{k:'signal',l:'Sinyal',t:'num',def:9},{k:'cMacd',l:'MACD',t:'color',def:'#2962ff'},{k:'cSig',l:'Sinyal',t:'color',def:'#ff9800'}],build(d,p){const m=MACD(src(d,'close'),p.fast,p.slow,p.signal);return[{title:'Hist',type:'hist',data:d.map((b,i)=>m.hist[i]==null?null:({time:b.time,value:m.hist[i],color:m.hist[i]>=0?(i>0&&m.hist[i-1]<m.hist[i]?'#26a69a':'#26a69a77'):(i>0&&m.hist[i-1]>m.hist[i]?'#ef5350':'#ef535077')})).filter(Boolean)},{title:'MACD',type:'line',color:p.cMacd,width:2,data:lineT(d,m.macd)},{title:'Sinyal',type:'line',color:p.cSig,width:2,data:lineT(d,m.signal)}]}},
  stoch:{name:'Stokastik',short:'STOCH',overlay:false,params:[{k:'kp',l:'%K',t:'num',def:14},{k:'ks',l:'%K Yum.',t:'num',def:1},{k:'dp',l:'%D',t:'num',def:3},{k:'cK',l:'%K',t:'color',def:'#2962ff'},{k:'cD',l:'%D',t:'color',def:'#ff6d00'}],build(d,p){const st=STOCH(d,p.kp,p.ks,p.dp);return[{title:'%K',type:'line',color:p.cK,width:2,data:lineT(d,st.k),guides:[{v:80,c:'#ef535066'},{v:20,c:'#26a69a66'}]},{title:'%D',type:'line',color:p.cD,width:1.5,data:lineT(d,st.d)}]}},

// ekstra matematik
function HIGHEST(d,p,key){const o=Array(d.length).fill(null);for(let i=p-1;i<d.length;i++){let m=-1e18;for(let j=i-p+1;j<=i;j++){const v=key?d[j][key]:d[j];if(v>m)m=v}o[i]=m}return o}
function LOWEST(d,p,key){const o=Array(d.length).fill(null);for(let i=p-1;i<d.length;i++){let m=1e18;for(let j=i-p+1;j<=i;j++){const v=key?d[j][key]:d[j];if(v<m)m=v}o[i]=m}return o}
function CHANGE(v,p){const o=Array(v.length).fill(null);for(let i=p;i<v.length;i++)o[i]=v[i]-v[i-p];return o}
function AC(d){const ao=AO(d),sm=SMAn(ao,5);return d.map((_,i)=>(ao[i]!=null&&sm[i]!=null)?ao[i]-sm[i]:null)}
function TRUERANGE(d){return d.map((b,i)=>i===0?b.high-b.low:Math.max(b.high-b.low,Math.abs(b.high-d[i-1].close),Math.abs(b.low-d[i-1].close)))}
function CHANDELIER(d,p,mult,long){const atr=ATR(d,p),hh=HIGHEST(d,p,'high'),ll=LOWEST(d,p,'low');return d.map((_,i)=>(atr[i]==null)?null:(long?hh[i]-mult*atr[i]:ll[i]+mult*atr[i]))}
function STREAKRSI(d){const streak=Array(d.length).fill(0);for(let i=1;i<d.length;i++){if(d[i].close>d[i-1].close)streak[i]=streak[i-1]>0?streak[i-1]+1:1;else if(d[i].close<d[i-1].close)streak[i]=streak[i-1]<0?streak[i-1]-1:-1;else streak[i]=0}return streak}
function CONNORS(d){const r=RSI(d.map(b=>b.close),3);const sr=RSI(STREAKRSI(d),2);const roc1=ROC(d.map(b=>b.close),1);const pr=PCTRANK(roc1.map(x=>x==null?0:x),100);return d.map((_,i)=>(r[i]!=null&&sr[i]!=null&&pr[i]!=null)?(r[i]+sr[i]+pr[i])/3:null)}
function NETVOL(d){return d.map((b,i)=>i===0?0:(b.close>d[i-1].close?b.value:(b.close<d[i-1].close?-b.value:0)))}
function MEDIANV(d,p){const o=Array(d.length).fill(null);for(let i=p-1;i<d.length;i++){const w=[];for(let j=i-p+1;j<=i;j++)w.push((d[j].high+d[j].low)/2);w.sort((a,b)=>a-b);o[i]=w[Math.floor(p/2)]}return o}

// yardımcı kayıt fonksiyonları
function regMA(short,name,type,color){REGISTRY[short.toLowerCase()]={name,short,overlay:true,cat:'Hareketli Ortalamalar',params:[{k:'length',l:'Uzunluk',t:'num',def:20},{k:'source',l:'Kaynak',t:'src',def:'close'},{k:'color',l:'Renk',t:'color',def:color}],build(d,p){return[{title:`${short} ${p.length}`,type:'line',color:p.color,width:2,data:lineT(d,maCalc(type,d,p.length,p.source))}]}}}
function regOsc(key,short,name,fn,guides,defs,colors){REGISTRY[key]={name,short,overlay:false,cat:'Momentum & Osilatörler',params:(defs||[{k:'length',l:'Uzunluk',t:'num',def:14}]).concat([{k:'color',l:'Renk',t:'color',def:colors||'#7e57c2'}]),build(d,p){return[{title:short,type:'line',color:p.color,width:2,data:lineT(d,fn(d,p)),guides:guides}]}}}

REGISTRY.envelope={name:'Zarf (Envelope)',short:'ENV',overlay:true,cat:'Bantlar & Kanallar',params:[{k:'length',l:'Uzunluk',t:'num',def:20},{k:'pct',l:'Yüzde %',t:'num',def:2.5,step:0.1},{k:'color',l:'Renk',t:'color',def:'#ffa726'}],build(d,p){const m=SMA(src(d,'close'),p.length);const up=m.map(x=>x==null?null:x*(1+p.pct/100)),lo=m.map(x=>x==null?null:x*(1-p.pct/100));return[{title:'Üst',type:'line',color:p.color,width:1,data:lineT(d,up)},{title:'Orta',type:'line',color:p.color+'88',width:1,dashed:true,data:lineT(d,m)},{title:'Alt',type:'line',color:p.color,width:1,data:lineT(d,lo)}]}};

function VIDYA(v,p){const cmo=CMO(v,p),alpha=2/(p+1),o=Array(v.length).fill(null);let prev=null;for(let i=0;i<v.length;i++){if(cmo[i]==null)continue;const k=alpha*Math.abs(cmo[i])/100;if(prev==null)prev=v[i];prev=k*v[i]+(1-k)*prev;o[i]=prev}return o}
function T3(v,p,b){b=b==null?0.7:b;const e1=EMAn(v,p),e2=EMAn(e1,p),e3=EMAn(e2,p),e4=EMAn(e3,p),e5=EMAn(e4,p),e6=EMAn(e5,p);const c1=-b*b*b,c2=3*b*b+3*b*b*b,c3=-6*b*b-3*b-3*b*b*b,c4=1+3*b+b*b*b+3*b*b;return v.map((_,i)=>e6[i]!=null?c1*e6[i]+c2*e5[i]+c3*e4[i]+c4*e3[i]:null)}
function COG(v,p){const o=Array(v.length).fill(null);for(let i=p-1;i<v.length;i++){let num=0,den=0;for(let j=0;j<p;j++){const price=v[i-j];num+=(j+1)*price;den+=price}o[i]=den?-num/den+(p+1)/2:null}return o}
function KVO(d,f,s){const vf=Array(d.length).fill(0);let trend=0,cm=0,prevDM=0;for(let i=1;i<d.length;i++){const hlc=d[i].high+d[i].low+d[i].close,phlc=d[i-1].high+d[i-1].low+d[i-1].close;const t=hlc>phlc?1:-1,dm=d[i].high-d[i].low;if(t===trend)cm=cm+dm;else cm=prevDM+dm;vf[i]=d[i].value*Math.abs(2*(cm?dm/cm:0)-1)*t*100;trend=t;prevDM=dm}const ef=EMAn(vf,f),es=EMAn(vf,s);return d.map((_,i)=>(ef[i]!=null&&es[i]!=null)?ef[i]-es[i]:null)}
function WAVETREND(d,n1,n2){const ap=d.map(b=>(b.high+b.low+b.close)/3),esa=EMAn(ap,n1);const dv=ap.map((x,i)=>esa[i]==null?null:Math.abs(x-esa[i])),de=EMAn(dv,n1);const ci=ap.map((x,i)=>(esa[i]!=null&&de[i]!=null&&de[i]!==0)?(x-esa[i])/(0.015*de[i]):null);const tci=EMAn(ci,n2);return{wt1:tci,wt2:SMAn(tci,4)}}
function MIDPOINT(d,p){const hh=HIGHEST(d,p,'high'),ll=LOWEST(d,p,'low');return d.map((_,i)=>(hh[i]!=null&&ll[i]!=null)?(hh[i]+ll[i])/2:null)}

function arrHighest(a,p){const o=Array(a.length).fill(null);for(let i=p-1;i<a.length;i++){let m=-1e18,ok=true;for(let j=i-p+1;j<=i;j++){if(a[j]==null){ok=false;break}if(a[j]>m)m=a[j]}if(ok)o[i]=m}return o}
function arrLowest(a,p){const o=Array(a.length).fill(null);for(let i=p-1;i<a.length;i++){let m=1e18,ok=true;for(let j=i-p+1;j<=i;j++){if(a[j]==null){ok=false;break}if(a[j]<m)m=a[j]}if(ok)o[i]=m}return o}
function DISPARITY(v,p){const e=EMAn(v,p);return v.map((x,i)=>(e[i]!=null&&e[i]!==0)?100*(x-e[i])/e[i]:null)}
function CHANDEKROLL(d,p,x,q){const atr=ATR(d,p),hh=HIGHEST(d,p,'high'),ll=LOWEST(d,p,'low');const fh=d.map((_,i)=>(hh[i]!=null&&atr[i]!=null)?hh[i]-x*atr[i]:null);const fl=d.map((_,i)=>(ll[i]!=null&&atr[i]!=null)?ll[i]+x*atr[i]:null);return{short:arrHighest(fh,q),long:arrLowest(fl,q)}}

REGISTRY.vwapbands={name:'VWAP Bantları',short:'VWAPB',overlay:true,cat:'Fiyat & VWAP',params:[{k:'mult',l:'Çarpan',t:'num',def:2,step:0.1},{k:'stdlen',l:'Std Uzunluk',t:'num',def:20},{k:'color',l:'Renk',t:'color',def:'#ab47bc'}],build(d,p){const vw=VWAP(d),sd=STD(src(d,'close'),p.stdlen);const up=d.map((_,i)=>(vw[i]!=null&&sd[i]!=null)?vw[i]+p.mult*sd[i]:null),lo=d.map((_,i)=>(vw[i]!=null&&sd[i]!=null)?vw[i]-p.mult*sd[i]:null);return[{title:'Üst',type:'line',color:p.color,width:1,data:lineT(d,up)},{title:'VWAP',type:'line',color:p.color+'aa',width:1.5,data:lineT(d,vw)},{title:'Alt',type:'line',color:p.color,width:1,data:lineT(d,lo)}]}};
REGISTRY.chandekroll={name:'Chande Kroll Stop',short:'CKS',overlay:true,cat:'Trend',params:[{k:'length',l:'ATR Uzunluk',t:'num',def:10},{k:'x',l:'Çarpan',t:'num',def:1,step:0.1},{k:'q',l:'Uzunluk',t:'num',def:9}],build(d,p){const r=CHANDEKROLL(d,p.length,p.x,p.q);return[{title:'Kısa Stop',type:'line',color:'#ef5350',width:1.5,data:lineT(d,r.short)},{title:'Uzun Stop',type:'line',color:'#26a69a',width:1.5,data:lineT(d,r.long)}]}};
REGISTRY.disparity={name:'Disparity Endeksi',short:'DISP',overlay:false,cat:'Momentum & Osilatörler',params:[{k:'length',l:'Uzunluk',t:'num',def:14},{k:'color',l:'Renk',t:'color',def:'#26c6da'}],build(d,p){return[{title:'DISP %',type:'line',color:p.color,width:2,data:lineT(d,DISPARITY(src(d,'close'),p.length)),guides:[{v:0,c:'#5d606b44',dashed:true}]}]}};
REGISTRY.stderr={name:'Standart Hata',short:'SE',overlay:false,cat:'İstatistik',params:[{k:'length',l:'Uzunluk',t:'num',def:20},{k:'color',l:'Renk',t:'color',def:'#78909c'}],build(d,p){const sd=STD(src(d,'close'),p.length);return[{title:'SE',type:'line',color:p.color,width:2,data:lineT(d,sd.map(x=>x==null?null:x/Math.sqrt(p.length)))}]}};

// --- ek matematik ---
function MCGINLEY(v,p){const o=Array(v.length).fill(null);let md=null;for(let i=0;i<v.length;i++){if(md==null)md=v[i];else{const r=md===0?1:v[i]/md;md=md+(v[i]-md)/((p*Math.pow(r,4))||1)}o[i]=md}return o}
function SWMA(v,p){const w=[];let sw=0;for(let j=0;j<p;j++){const x=Math.sin(Math.PI*(j+1)/(p+1));w.push(x);sw+=x}const o=Array(v.length).fill(null);for(let i=p-1;i<v.length;i++){let s=0,ok=true;for(let j=0;j<p;j++){const val=v[i-p+1+j];if(val==null){ok=false;break}s+=val*w[j]}if(ok&&sw)o[i]=s/sw}return o}
function TSF(v,p){const o=Array(v.length).fill(null);for(let i=p-1;i<v.length;i++){let sx=0,sy=0,sxy=0,sxx=0;for(let j=0;j<p;j++){const x=j,y=v[i-p+1+j];sx+=x;sy+=y;sxy+=x*y;sxx+=x*x}const den=p*sxx-sx*sx;if(den){const b=(p*sxy-sx*sy)/den,a=(sy-b*sx)/p;o[i]=a+b*p}}return o}
function RMI(v,p,mom){const up=[],dn=[];for(let i=0;i<v.length;i++){if(i<mom){up.push(0);dn.push(0);continue}const ch=v[i]-v[i-mom];up.push(Math.max(ch,0));dn.push(Math.max(-ch,0))}const au=RMA(up,p),ad=RMA(dn,p),o=Array(v.length).fill(null);for(let i=0;i<v.length;i++)if(au[i]!=null&&ad[i]!=null)o[i]=(au[i]+ad[i])===0?50:100*au[i]/(au[i]+ad[i]);return o}
function IMI(d,p){const o=Array(d.length).fill(null);for(let i=p-1;i<d.length;i++){let gu=0,gd=0;for(let j=i-p+1;j<=i;j++){if(d[j].close>d[j].open)gu+=d[j].close-d[j].open;else gd+=d[j].open-d[j].close}o[i]=(gu+gd)===0?50:100*gu/(gu+gd)}return o}
function PGO(d,p){const sma=SMA(d.map(b=>b.close),p),tr=TRUERANGE(d),eatr=EMAn(tr,p);return d.map((b,i)=>(sma[i]!=null&&eatr[i]!=null&&eatr[i]!==0)?(b.close-sma[i])/eatr[i]:null)}
function CFO(v,p){const tsf=TSF(v,p);return v.map((x,i)=>(tsf[i]!=null&&x!==0)?100*(x-tsf[i])/x:null)}
function VHF(v,p){const o=Array(v.length).fill(null);for(let i=p;i<v.length;i++){let hh=-1e18,ll=1e18,sum=0;for(let j=i-p+1;j<=i;j++){if(v[j]>hh)hh=v[j];if(v[j]<ll)ll=v[j];sum+=Math.abs(v[j]-v[j-1])}o[i]=sum?(hh-ll)/sum:null}return o}
function TII(v,p){const sma=SMA(v,p),half=Math.ceil(p/2),o=Array(v.length).fill(null);for(let i=p-1;i<v.length;i++){let pos=0,neg=0;for(let j=i-half+1;j<=i;j++){if(sma[j]==null)continue;const dd=v[j]-sma[j];if(dd>0)pos+=dd;else neg+=-dd}o[i]=(pos+neg)===0?50:100*pos/(pos+neg)}return o}
function RWI(d,p){const hi=Array(d.length).fill(null),lo=Array(d.length).fill(null),atr=ATR(d,p);for(let i=p;i<d.length;i++){let mh=-1e18,ml=-1e18;for(let n=2;n<=p;n++){const a=atr[i];if(a==null||a===0)continue;const rh=(d[i].high-d[i-n].low)/(a*Math.sqrt(n)),rl=(d[i-n].high-d[i].low)/(a*Math.sqrt(n));if(rh>mh)mh=rh;if(rl>ml)ml=rl}hi[i]=mh;lo[i]=ml}return{hi,lo}}
function VZO(d,p){const r=d.map((b,i)=>i===0?0:(b.close>d[i-1].close?b.value:(b.close<d[i-1].close?-b.value:0))),ev=EMAn(r,p),tv=EMAn(d.map(b=>b.value),p);return d.map((_,i)=>(ev[i]!=null&&tv[i])?100*ev[i]/tv[i]:null)}
function VROC(d,p){const vol=d.map(b=>b.value),o=Array(d.length).fill(null);for(let i=p;i<d.length;i++)o[i]=vol[i-p]===0?0:100*(vol[i]-vol[i-p])/vol[i-p];return o}
function TWIGGS(d,p){const tr=[],vol=[];for(let i=0;i<d.length;i++){const th=i===0?d[i].high:Math.max(d[i].high,d[i-1].close),tl=i===0?d[i].low:Math.min(d[i].low,d[i-1].close);tr.push((th===tl)?0:((2*d[i].close-tl-th)/(th-tl))*d[i].value);vol.push(d[i].value)}const ea=RMA(tr,p),ev=RMA(vol,p);return d.map((_,i)=>(ea[i]!=null&&ev[i])?ea[i]/ev[i]:null)}
function RELVOL(d,p){const vol=d.map(b=>b.value),sm=SMA(vol,p);return d.map((b,i)=>(sm[i])?b.value/sm[i]:null)}
function VARIANCE(v,p){const s=STD(v,p);return s.map(x=>x==null?null:x*x)}
function MAD(v,p){const sm=SMAn(v,p),o=Array(v.length).fill(null);for(let i=p-1;i<v.length;i++){if(sm[i]==null)continue;let s=0;for(let j=i-p+1;j<=i;j++)s+=Math.abs(v[j]-sm[i]);o[i]=s/p}return o}
function RSQ(v,p){const o=Array(v.length).fill(null);for(let i=p-1;i<v.length;i++){let sx=0,sy=0,sxy=0,sxx=0,syy=0;for(let j=0;j<p;j++){const x=j,y=v[i-p+1+j];sx+=x;sy+=y;sxy+=x*y;sxx+=x*x;syy+=y*y}const num=p*sxy-sx*sy,den=Math.sqrt((p*sxx-sx*sx)*(p*syy-sy*sy));o[i]=den?100*Math.pow(num/den,2):null}return o}
function STC(v,fast,slow,cyc){const ef=EMAn(v,fast),es=EMAn(v,slow),macd=v.map((_,i)=>(ef[i]!=null&&es[i]!=null)?ef[i]-es[i]:null);const st=(arr,pp)=>{const o=Array(arr.length).fill(null);for(let i=0;i<arr.length;i++){if(arr[i]==null)continue;let hh=-1e18,ll=1e18,ok=true;for(let j=i-pp+1;j<=i;j++){if(j<0||arr[j]==null){ok=false;break}if(arr[j]>hh)hh=arr[j];if(arr[j]<ll)ll=arr[j]}if(ok)o[i]=hh===ll?0:100*(arr[i]-ll)/(hh-ll)}return o};return EMAn(st(EMAn(st(macd,cyc),2),cyc),2)}
function PMO(v){const roc=v.map((x,i)=>i>0&&v[i-1]?100*(x/v[i-1]-1):null),s1=EMAn(roc.map(x=>x==null?null:x*10),35),pmo=EMAn(s1,20);return{pmo,sig:EMAn(pmo,10)}}
function VWMACD(d,f,s,sig){const v=d.map(b=>b.close),ef=VWMA_(d,v,f),es=VWMA_(d,v,s),macd=d.map((_,i)=>(ef[i]!=null&&es[i]!=null)?ef[i]-es[i]:null);return{macd,sig:EMAn(macd,sig)}}
function SQUEEZE(d,p,bbm,kcm){const v=d.map(b=>b.close),basis=SMA(v,p),dev=STD(v,p),atr=ATR(d,p),hh=HIGHEST(d,p,'high'),ll=LOWEST(d,p,'low');const sqz=[],detr=[];for(let i=0;i<d.length;i++){if(basis[i]==null){sqz.push(null);detr.push(null);continue}const bbU=basis[i]+bbm*dev[i],bbL=basis[i]-bbm*dev[i],kcU=basis[i]+kcm*atr[i],kcL=basis[i]-kcm*atr[i];sqz.push((bbU<kcU&&bbL>kcL)?1:0);detr.push(v[i]-((hh[i]+ll[i])/2+basis[i])/2)}return{sqz,mom:LINREG(detr,p)}}
function WADDAH(d,fast,slow,chan,mult){const v=d.map(b=>b.close),ef=EMAn(v,fast),es=EMAn(v,slow),macd=d.map((_,i)=>(ef[i]!=null&&es[i]!=null)?ef[i]-es[i]:null),t=d.map((_,i)=>(macd[i]!=null&&i>0&&macd[i-1]!=null)?(macd[i]-macd[i-1])*mult:null),basis=SMA(v,chan),dev=STD(v,chan),expl=d.map((_,i)=>dev[i]!=null?4*dev[i]:null);return{trend:t,expl}}
function HILO(d,p){const sh=SMA(d.map(b=>b.high),p),sl=SMA(d.map(b=>b.low),p),o=Array(d.length).fill(null);let mode=1;for(let i=1;i<d.length;i++){if(sh[i-1]==null||sl[i-1]==null)continue;if(d[i].close>sh[i-1])mode=1;else if(d[i].close<sl[i-1])mode=-1;o[i]=mode===1?sl[i]:sh[i]}return o}
function PIVOTS(d,mode){const P=Array(d.length).fill(null),r1=P.slice(),s1=P.slice(),r2=P.slice(),s2=P.slice(),r3=P.slice(),s3=P.slice();for(let i=1;i<d.length;i++){const H=d[i-1].high,L=d[i-1].low,C=d[i-1].close,rng=H-L,p=(H+L+C)/3;P[i]=p;if(mode==='fib'){r1[i]=p+0.382*rng;r2[i]=p+0.618*rng;r3[i]=p+rng;s1[i]=p-0.382*rng;s2[i]=p-0.618*rng;s3[i]=p-rng}else if(mode==='cam'){r1[i]=C+rng*1.1/12;r2[i]=C+rng*1.1/6;r3[i]=C+rng*1.1/4;s1[i]=C-rng*1.1/12;s2[i]=C-rng*1.1/6;s3[i]=C-rng*1.1/4}else if(mode==='wood'){const pw=(H+L+2*C)/4;P[i]=pw;r1[i]=2*pw-L;s1[i]=2*pw-H;r2[i]=pw+rng;s2[i]=pw-rng;r3[i]=H+2*(pw-L);s3[i]=L-2*(H-pw)}else{r1[i]=2*p-L;s1[i]=2*p-H;r2[i]=p+rng;s2[i]=p-rng;r3[i]=H+2*(p-L);s3[i]=L-2*(H-p)}}return{P,r1,s1,r2,s2,r3,s3}}
function ZIGZAG(d,pct){const o=Array(d.length).fill(null);if(!d.length)return o;let lp=d[0].close,li=0,dir=0;for(let i=1;i<d.length;i++){const ch=(d[i].close-lp)/lp*100;if(dir>=0&&ch<=-pct){o[li]=lp;dir=-1;lp=d[i].close;li=i}else if(dir<=0&&ch>=pct){o[li]=lp;dir=1;lp=d[i].close;li=i}else if((dir>=0&&d[i].close>lp)||(dir<=0&&d[i].close<lp)){lp=d[i].close;li=i}}o[li]=lp;o[0]=d[0].close;return o}
function LINREGCHANNEL(d,p,mult){const v=d.map(b=>b.close),n=d.length,mid=Array(n).fill(null),up=Array(n).fill(null),lo=Array(n).fill(null);if(n<p)return{mid,up,lo};const start=n-p;let sx=0,sy=0,sxy=0,sxx=0;for(let j=0;j<p;j++){const x=j,y=v[start+j];sx+=x;sy+=y;sxy+=x*y;sxx+=x*x}const den=p*sxx-sx*sx;if(!den)return{mid,up,lo};const b=(p*sxy-sx*sy)/den,a=(sy-b*sx)/p;let se=0;for(let j=0;j<p;j++){const r=v[start+j]-(a+b*j);se+=r*r}const sd=Math.sqrt(se/p);for(let j=0;j<p;j++){const y=a+b*j;mid[start+j]=y;up[start+j]=y+mult*sd;lo[start+j]=y-mult*sd}return{mid,up,lo}}
function TWAP(d){const o=Array(d.length).fill(null);let s=0;for(let i=0;i<d.length;i++){s+=(d[i].high+d[i].low+d[i].close)/3;o[i]=s/(i+1)}return o}
function KDJ(d,p){const rsv=Array(d.length).fill(null);for(let i=p-1;i<d.length;i++){let hh=-1e18,ll=1e18;for(let j=i-p+1;j<=i;j++){if(d[j].high>hh)hh=d[j].high;if(d[j].low<ll)ll=d[j].low}rsv[i]=hh===ll?50:100*(d[i].close-ll)/(hh-ll)}const K=Array(d.length).fill(null),D=Array(d.length).fill(null),J=Array(d.length).fill(null);let pk=50,pd=50;for(let i=0;i<d.length;i++){if(rsv[i]==null)continue;pk=(2/3)*pk+(1/3)*rsv[i];pd=(2/3)*pd+(1/3)*pk;K[i]=pk;D[i]=pd;J[i]=3*pk-2*pd}return{K,D,J}}
function WILLIAMSAD(d){const o=Array(d.length).fill(0);let ad=0;for(let i=1;i<d.length;i++){const trh=Math.max(d[i].high,d[i-1].close),trl=Math.min(d[i].low,d[i-1].close);let mv=0;if(d[i].close>d[i-1].close)mv=d[i].close-trl;else if(d[i].close<d[i-1].close)mv=d[i].close-trh;ad+=mv;o[i]=ad}return o}
function PCTFROMMA(v,p){const e=EMAn(v,p);return v.map((x,i)=>(e[i]!=null&&e[i]!==0)?100*(x-e[i])/e[i]:null)}
function ERGODIC(v,r,s,sig){const t=TSI(v,r,s);return{erg:t,sig:EMAn(t,sig)}}
function STOCHFAST(d,k,dd){const o=Array(d.length).fill(null);for(let i=k-1;i<d.length;i++){let hh=-1e18,ll=1e18;for(let j=i-k+1;j<=i;j++){if(d[j].high>hh)hh=d[j].high;if(d[j].low<ll)ll=d[j].low}o[i]=hh===ll?50:100*(d[i].close-ll)/(hh-ll)}return{k:o,d:SMAn(o,dd)}}
function DYMOI(v,base){const std=STD(v,10),o=Array(v.length).fill(null);const avg=SMAn(std,10);for(let i=0;i<v.length;i++){if(avg[i]==null||avg[i]===0){continue}let td=Math.round(base*(std[i]/avg[i]));td=Math.max(5,Math.min(30,td||base));if(i>=td){let su=0,sd=0;for(let j=i-td+1;j<=i;j++){const ch=v[j]-v[j-1];if(ch>0)su+=ch;else sd+=-ch}o[i]=(su+sd)===0?50:100*su/(su+sd)}}return o}

function FRAMAc(d,p){const o=Array(d.length).fill(null),price=d.map(b=>(b.high+b.low)/2),n=p%2?p+1:p,half=n/2;let prev=null;for(let i=0;i<d.length;i++){if(i<n){o[i]=price[i];prev=price[i];continue}let h1=-1e18,l1=1e18,h2=-1e18,l2=1e18,h3=-1e18,l3=1e18;for(let j=i-n+1;j<=i-half;j++){if(d[j].high>h1)h1=d[j].high;if(d[j].low<l1)l1=d[j].low}for(let j=i-half+1;j<=i;j++){if(d[j].high>h2)h2=d[j].high;if(d[j].low<l2)l2=d[j].low}for(let j=i-n+1;j<=i;j++){if(d[j].high>h3)h3=d[j].high;if(d[j].low<l3)l3=d[j].low}const N1=(h1-l1)/half,N2=(h2-l2)/half,N3=(h3-l3)/n;let dim=(N1>0&&N2>0&&N3>0)?(Math.log(N1+N2)-Math.log(N3))/Math.log(2):1;let al=Math.exp(-4.6*(dim-1));al=Math.max(0.01,Math.min(1,al));prev=al*price[i]+(1-al)*prev;o[i]=prev}return o}
function SSFc(v,p){const a=Math.exp(-1.414*Math.PI/p),b=2*a*Math.cos(1.414*Math.PI/p),c2=b,c3=-a*a,c1=1-c2-c3,o=Array(v.length).fill(null);for(let i=0;i<v.length;i++){o[i]=(i<2)?v[i]:c1*(v[i]+v[i-1])/2+c2*o[i-1]+c3*o[i-2]}return o}

function ELDERIMPc(d){const c=d.map(b=>b.close),ema=EMAn(c,13),ef=EMAn(c,12),es=EMAn(c,26);const macd=c.map((_,i)=>(ef[i]!=null&&es[i]!=null)?ef[i]-es[i]:null),sig=EMAn(macd,9),hist=macd.map((m,i)=>(m!=null&&sig[i]!=null)?m-sig[i]:null);return d.map((b,i)=>{if(ema[i]==null||hist[i]==null||i<1)return null;const eu=ema[i]>ema[i-1],hu=hist[i]>hist[i-1];let col='#9598a1aa';if(eu&&hu)col='#26a69aaa';else if(!eu&&!hu)col='#ef5350aa';return{time:b.time,value:hist[i],color:col}}).filter(Boolean)}

class Motor{
  constructor(wrap,hooks){

    this.inds=[];this._iid=0;
    this.style={};              /* {up,down,bg,grid,lineColor,lineWidth} — tema üstüne */
    this.bs=8;this.offset=0;this.axisW=64;this.axisH=24;this.padFrac=.08;
    this.cross=null;this.w=0;this.h=0;this.dpr=1;
    this._raf=0;this._oraf=0;this._legendI=-2;this._pMin=0;this._pMax=1;this._lastStep=1;
    this.panes=[];this.lastDrawMs=0;this.lastDrawn=0;

    this._pointers=new Map();this._pinch=null;this._drag=null;this._labelRects=[];
    this._bind();
    if(typeof ResizeObserver!=='undefined'){this._ro=new ResizeObserver(()=>this.resize());this._ro.observe(wrap)}
    this.resize();
  }
  destroy(){if(this._ro)this._ro.disconnect();this.wrap.innerHTML=''}
  T(){ /* tema + panel stili birleşimi */
    const s=this.style||{};
    return{
      bg:s.bg||cssVar('--bg','#131722'),grid:s.grid||cssVar('--grid','#1c2030'),
      ink:cssVar('--text','#d1d4dc'),muted:cssVar('--muted','#787b86'),faint:cssVar('--muted-2','#5d606b'),
      up:s.up||'#26a69a',down:s.down||'#ef5350',
      accent:cssVar('--accent','#2962ff'),border:cssVar('--border','#2a2e39'),
      lineColor:s.lineColor||cssVar('--accent','#2962ff'),lineWidth:s.lineWidth||2,
      mono:'ui-monospace,Consolas,monospace',sans:'system-ui,sans-serif'
    };
  }
  emitChange(){if(this.hooks.onChange)this.hooks.onChange()}

  /* ===== geometri ===== */
  plotW(){return Math.max(0,this.w-this.axisW)}
  plotH(){return Math.max(0,this.h-this.axisH)}
  xOf(i){return this.plotW()-(this.offset-i)*this.bs}
  iOf(x){return this.offset-(this.plotW()-x)/this.bs}
  visRange(){
    const n=this.data.length;if(!n)return null;
    const from=clamp(Math.floor(this.iOf(0)),0,n-1);
    const to=clamp(Math.ceil(this.offset),0,n-1);
    return from<=to?{from,to}:null;
  }
  toY(pane,v){
    const t=(pane.logSpace)?(Math.log(v)-pane.sMin)/(pane.sMax-pane.sMin)
                           :(v-pane.vMin)/(pane.vMax-pane.vMin);
    return pane.y1-t*(pane.y1-pane.y0);
  }
  toV(pane,y){
    const t=(pane.y1-y)/(pane.y1-pane.y0);
    return pane.logSpace?Math.exp(pane.sMin+t*(pane.sMax-pane.sMin))
                        :pane.vMin+t*(pane.vMax-pane.vMin);
  }
  yOf(p){return this.toY(this.panes[0],p)}

  _paneAt(y){for(const p of this.panes)if(y>=p.y0&&y<=p.y1)return p;return this.panes[0]}

  /* ===== veri ===== */
  setData(sym,tfSec,bars,prec){
    this.data=bars;this.sym=sym;this.tfSec=tfSec;if(prec!=null)this.prec=prec;
    this._legendI=-2;this.manual={};

  }
  setType(t){this.type=t;this._rebuildDisp();this.requestDraw();this.emitChange()}
  setLog(b){this.log=b;this.requestDraw();this.emitChange()}

    const d=this.data,out=[];let po=0,pc=0;

      out.push({time:b.time,open:ho,close:hc,high:Math.max(b.high,ho,hc),low:Math.min(b.low,ho,hc),value:b.value});
      po=ho;pc=hc;

  }

  /* ===== indikatörler: REGISTRY adaptörü =====
     REGISTRY.build(d,p) → [{title,type:'line'|'hist'|'volume',color,width,dashed,data:[{time,value,color?}],guides?}]
     Motor plot: {type,color,width,dashed,vals[],colors[]|null,title} */
  addInd(key,params){
    const def=REGISTRY[key];if(!def)return null;
    const prm=params?{...params}:{};
    (def.params||[]).forEach(p=>{if(prm[p.k]===undefined)prm[p.k]=p.def});
    const inst={id:++this._iid,key,params:prm,name:def.name,short:def.short,overlay:!!def.overlay};
    this._buildInd(inst);
    this.inds.push(inst);
    this.requestDraw();this.emitChange();
    return inst;
  }
  removeInd(id){
    const at=this.inds.findIndex(i=>i.id===id);
    if(at>=0){this.inds.splice(at,1);this.requestDraw();this.emitChange()}
  }
  updateInd(id,params){
    const inst=this.inds.find(i=>i.id===id);if(!inst)return;
    Object.assign(inst.params,params);
    this._buildInd(inst);
